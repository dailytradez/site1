      { week:5, title:"Reading Price Charts", hours:10,
        task:"Open TradingView (free). Find 3 different stocks. Draw support and resistance lines on each. Identify at least one trend.",
        topics:[
          { name:"Candlestick Charts", tag:"Essential", links:[
            { type:"yt", name:"Candlestick Charts Explained for Beginners — Rayner Teo", url:"https://www.youtube.com/watch?v=CD2M2UMXxKY" },
            { type:"yt", name:"How to Read Candlestick Charts Fast — Trading 212", url:"https://www.youtube.com/watch?v=gWHPGBPT1m4" },
            { type:"web", name:"Investopedia: Candlestick Patterns", url:"https://www.investopedia.com/trading/candlestick-charting-what-is-it/" },
            { type:"web", name:"TradingView — Free charting platform", url:"https://www.tradingview.com" },
          ], content:`
            <div class="lesson-block">
              <h3>Why Candlestick Charts?</h3>
              <p>Candlestick charts show 4 pieces of information for each time period: Open, High, Low, and Close (OHLC). They give a much richer picture than simple line charts.</p>
              <h3>Anatomy of a Candlestick</h3>
              <ul>
                <li><strong>Body:</strong> The rectangle between Open and Close</li>
                <li><strong>Wick/Shadow:</strong> The thin lines above/below showing High and Low</li>
                <li><strong>Green/White candle:</strong> Close was HIGHER than Open (buyers won)</li>
                <li><strong>Red/Black candle:</strong> Close was LOWER than Open (sellers won)</li>
              </ul>
              <h3>Key Single Candle Patterns</h3>
              <ul>
                <li><strong>Doji:</strong> Open and close almost equal. Indecision. Watch for what follows.</li>
                <li><strong>Hammer:</strong> Small body, long lower wick. Rejection of lower prices. Bullish at support.</li>
                <li><strong>Shooting Star:</strong> Small body, long upper wick. Rejection of higher prices. Bearish at resistance.</li>
                <li><strong>Marubozu:</strong> No wicks — pure buying or selling pressure all session.</li>
              </ul>
              <div class="callout tip"><div class="callout-label">Context Matters Most</div><p>A hammer at a major support level after a strong downtrend is a powerful signal. The same hammer in the middle of nowhere is meaningless. Always interpret candles in context.</p></div>
            </div>
          `, quiz:{ q:"A green candlestick means:", opts:["The stock went up all day without any selling","The closing price was higher than the opening price","The stock hit a new all-time high","Volume was above average"], correct:1, explanation:"A green (bullish) candle simply means the stock closed higher than it opened during that time period. It tells you buyers had more control than sellers during that session." }},

          { name:"Support & Resistance", tag:"Critical", links:[
            { type:"yt", name:"Support and Resistance Explained — Rayner Teo", url:"https://www.youtube.com/watch?v=GnBoNvQMFJE" },
            { type:"yt", name:"How to Draw Support & Resistance Correctly", url:"https://www.youtube.com/watch?v=1USXn6RFQFE" },
            { type:"web", name:"Investopedia: Support and Resistance Basics", url:"https://www.investopedia.com/trading/support-and-resistance-basics/" },
          ], content:`
            <div class="lesson-block">
              <h3>Support Levels</h3>
              <p>Support is a price level where buying interest is strong enough to prevent the price from falling further. Think of it as a floor — the price bounces up off it repeatedly.</p>
              <h3>Resistance Levels</h3>
              <p>Resistance is a price level where selling pressure is strong enough to prevent the price from rising further. Think of it as a ceiling — the price gets rejected down from it.</p>
              <div class="callout example"><div class="callout-label">Why Do These Levels Exist?</div><p>Traders have memories. If a stock bounced at €50 three times before, thousands of traders will set buy orders at €50 next time it approaches there — creating a self-fulfilling support level.</p></div>
              <h3>Support Becomes Resistance (and Vice Versa)</h3>
              <p>Once a support level is broken (price closes below it), it often becomes a new resistance level. This "role reversal" is one of the most powerful concepts in technical analysis.</p>
              <div class="callout tip"><div class="callout-label">How to Draw Levels</div><p>Look for areas where price reversed multiple times. The more times a level has been tested, the more significant it is. Draw lines at the BODY of candles, not the wicks, for cleaner levels.</p></div>
              <h3>Trading with Support & Resistance</h3>
              <ul>
                <li>Buy near support, with stop-loss below support</li>
                <li>Sell/take profit near resistance</li>
                <li>Look for breakouts above resistance — potential for big moves</li>
              </ul>
            </div>
          `, quiz:{ q:"A stock breaks BELOW a previous support level and then rises back to that level. How should you expect the level to behave now?", opts:["It acts as support again","It now acts as resistance — the old support becomes a ceiling","The level is irrelevant now","The stock will immediately continue falling"], correct:1, explanation:"When support is broken, it typically becomes resistance. This is called 'role reversal.' Traders who bought at that level are now trapped at a loss and will sell (creating resistance) when price returns to their entry level." }},

          { name:"Trend Lines & Trend Trading", tag:"Essential", links:[
            { type:"yt", name:"How to Draw Trend Lines Correctly — Rayner Teo", url:"https://www.youtube.com/watch?v=3X9g3FxuDRg" },
            { type:"yt", name:"Trend Trading Strategy for Beginners", url:"https://www.youtube.com/watch?v=ZwzoapL30FQ" },
            { type:"web", name:"Investopedia: Trendlines", url:"https://www.investopedia.com/terms/t/trendline.asp" },
            { type:"web", name:"TradingView — Practice drawing trend lines", url:"https://www.tradingview.com" },
          ], content:`
            <div class="lesson-block">
              <h3>The Trend Is Your Friend</h3>
              <p>The most fundamental principle of technical analysis: trade in the direction of the trend. Trying to fight the trend is one of the most common ways traders lose money.</p>
              <h3>Drawing Trend Lines</h3>
              <ul>
                <li><strong>Uptrend line:</strong> Connect two or more higher lows. Price should stay above this line in an uptrend.</li>
                <li><strong>Downtrend line:</strong> Connect two or more lower highs. Price should stay below in a downtrend.</li>
                <li>A valid trend line needs at least 2 touches. Three touches makes it highly significant.</li>
              </ul>
              <h3>Types of Trends</h3>
              <ul>
                <li><strong>Uptrend:</strong> Series of higher highs AND higher lows</li>
                <li><strong>Downtrend:</strong> Series of lower highs AND lower lows</li>
                <li><strong>Sideways/Ranging:</strong> Price oscillates between horizontal support and resistance</li>
              </ul>
              <div class="callout tip"><div class="callout-label">How to Trade Trends</div><p>In an uptrend, look for pullbacks to the trend line or moving averages to buy. In a downtrend, wait for a trend reversal signal before buying. Never try to catch a falling knife — wait for evidence the downtrend has ended.</p></div>
              <h3>Trend Strength</h3>
              <p>A steep trend is unsustainable — it will either break or slow. A moderate, steady trend with regular pullbacks is the healthiest and most tradeable type.</p>
            </div>
          `, quiz:{ q:"What defines an uptrend in technical analysis?", opts:["The stock is above its 200-day moving average","A series of higher highs AND higher lows","The stock went up more than 20% this year","Volume is increasing"], correct:1, explanation:"An uptrend is technically defined as a series of higher highs (each rally goes higher than the last) AND higher lows (each pullback stops higher than the previous one). Both conditions must be true." }},
        ]
      },
      { week:6, title:"Chart Patterns", hours:10,
        task:"Use TradingView to scan 20 different charts. Find and screenshot at least 3 different chart patterns. Note what happened after each pattern.",
        topics:[
          { name:"Breakout Patterns (Flags & Triangles)", tag:"Intermediate", links:[
            { type:"yt", name:"Bull Flag Pattern — How to Trade It Correctly", url:"https://www.youtube.com/watch?v=oiHxqF7TRgI" },
            { type:"yt", name:"Triangle Chart Patterns Explained — SMB Capital", url:"https://www.youtube.com/watch?v=m5J06SQ_TAM" },
            { type:"web", name:"Investopedia: Bull Flag Pattern", url:"https://www.investopedia.com/terms/b/bull-flag.asp" },
            { type:"web", name:"Investopedia: Triangle Patterns", url:"https://www.investopedia.com/terms/t/triangle.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>Bull Flag</h3>
              <p>A bull flag forms after a sharp, strong move up (the flagpole), followed by a tight, sideways or slightly downward consolidation (the flag). The flag looks like a small rectangle or channel. Breakout above the flag = continuation upward.</p>
              <div class="callout example"><div class="callout-label">Trading a Bull Flag</div><p>Wait for price to break above the upper boundary of the flag on increased volume. Enter at breakout. Stop-loss just below the flag low. Target = flagpole height added to breakout point.</p></div>
              <h3>Ascending Triangle</h3>
              <p>Flat resistance on top, rising support line below. Buyers are getting more aggressive — each low is higher. Usually resolves with a breakout UPWARD through the flat resistance.</p>
              <h3>Descending Triangle</h3>
              <p>Flat support on bottom, declining resistance on top. Sellers are more aggressive. Usually resolves with a breakdown DOWNWARD through the flat support.</p>
              <h3>Symmetrical Triangle</h3>
              <p>Converging trend lines — lower highs and higher lows. A coiling spring. Can break either direction — wait for the breakout to determine which way to trade it. Breakout direction often continues the prior trend.</p>
              <div class="callout tip"><div class="callout-label">Volume Is Key</div><p>A breakout on HIGH volume is much more reliable than one on low volume. Always wait for volume confirmation before entering a breakout trade.</p></div>
            </div>
          `, quiz:{ q:"A stock has a sharp 30% move up, then consolidates sideways for 2 weeks in a tight range. What pattern is forming?", opts:["Head and shoulders","Double top","Bull flag","Descending triangle"], correct:2, explanation:"A sharp upward move (flagpole) followed by a tight sideways/slightly down consolidation (flag) is a classic bull flag pattern — a continuation pattern that often leads to another move upward." }},

          { name:"Reversal Patterns", tag:"Intermediate", links:[
            { type:"yt", name:"Head and Shoulders Pattern — Full Explanation", url:"https://www.youtube.com/watch?v=SN8EjkJMCpE" },
            { type:"yt", name:"Double Top & Double Bottom — How to Trade Them", url:"https://www.youtube.com/watch?v=HvOFUm0OHNU" },
            { type:"web", name:"Investopedia: Head and Shoulders Pattern", url:"https://www.investopedia.com/terms/h/head-shoulders.asp" },
            { type:"web", name:"Investopedia: Double Top and Bottom", url:"https://www.investopedia.com/terms/d/doubletop.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>Head & Shoulders (Bearish Reversal)</h3>
              <p>One of the most reliable reversal patterns. Forms at the top of an uptrend.</p>
              <ul>
                <li><strong>Left Shoulder:</strong> Rally and pullback</li>
                <li><strong>Head:</strong> Higher rally and pullback to same area (neckline)</li>
                <li><strong>Right Shoulder:</strong> Lower rally than head, pullback to neckline</li>
                <li><strong>Trigger:</strong> Break below the neckline = bearish signal</li>
              </ul>
              <h3>Double Top (Bearish)</h3>
              <p>Price hits a resistance level twice and fails both times. The two peaks are at roughly the same level. Break below the valley between the two peaks = bearish trigger.</p>
              <h3>Double Bottom (Bullish)</h3>
              <p>Price hits a support level twice and bounces both times. Break above the peak between the two bottoms = bullish trigger. Often called a "W" pattern.</p>
              <div class="callout example"><div class="callout-label">Target for Double Bottom</div><p>Measure the height from the bottom to the neckline. Add that distance to the breakout point for your price target.</p></div>
              <div class="callout warn"><div class="callout-label">Patience Required</div><p>Don't jump in before the pattern completes and breaks. Many traders buy the "second bottom" too early — wait for the confirmed breakout with volume before entering.</p></div>
            </div>
          `, quiz:{ q:"Where should you place your stop-loss when trading a head and shoulders breakdown?", opts:["Below the left shoulder","Above the right shoulder (pattern invalidation point)","Below the neckline","At the head high"], correct:1, explanation:"If you're shorting a head and shoulders breakdown, your stop-loss should go just above the right shoulder. If price moves back above the right shoulder, the pattern is invalidated." }},

          { name:"Cup & Handle Pattern", tag:"Intermediate", links:[
            { type:"yt", name:"Cup and Handle Pattern — How to Trade It", url:"https://www.youtube.com/watch?v=EHXoJPz3wY8" },
            { type:"yt", name:"William O'Neil Cup & Handle — IBD", url:"https://www.youtube.com/watch?v=JTi2cPJCJ4E" },
            { type:"web", name:"Investopedia: Cup and Handle", url:"https://www.investopedia.com/terms/c/cupandhandle.asp" },
            { type:"web", name:"IBD — Investor's Business Daily Chart School", url:"https://www.investors.com/ibd-university/" },
          ], content:`
            <div class="lesson-block">
              <h3>What Is the Cup & Handle?</h3>
              <p>Developed by William O'Neil, the cup and handle is one of the most powerful bullish continuation patterns. It represents a period of consolidation and healthy "digestion" before a stock continues higher.</p>
              <h3>The Cup</h3>
              <p>The cup forms a rounded U-shape (not a sharp V). It should take 7-65 weeks to form. The right side of the cup should reach back to the level of the left side (prior high).</p>
              <h3>The Handle</h3>
              <p>After forming the cup, the stock "wedges" slightly lower in a tight, orderly pullback — the handle. Volume should dry up during the handle (weak holders exiting). The handle typically lasts 1-4 weeks.</p>
              <h3>The Breakout</h3>
              <p>The buy point is when the stock breaks above the handle's resistance (the high of the handle) on volume at least 40-50% above average. This is the pivot buy point.</p>
              <div class="callout tip"><div class="callout-label">O'Neil's Key Rule</div><p>The cup depth should be no more than 30-33% in a normal bull market, 40-50% in a bear market correction. A deeper cup suggests too much selling pressure and is less reliable.</p></div>
              <div class="callout example"><div class="callout-label">Famous Examples</div><p>Many of the greatest stock market winners in history formed cup and handle patterns before their biggest runs — including early Apple, Google, Netflix, and NVIDIA at various points in their history.</p></div>
            </div>
          `, quiz:{ q:"During the handle formation of a cup & handle pattern, what should volume ideally do?", opts:["Surge to new highs","Remain flat and unchanged","Dry up and decrease — showing weak selling pressure","Double from the cup formation"], correct:2, explanation:"During the handle, volume should decrease (dry up). This shows that selling pressure is light — weak holders are exiting, but big institutional buyers are not selling. The volume surge comes at the breakout." }},
        ]
      },
      { week:7, title:"Technical Indicators", hours:10,
        task:"Set up a TradingView chart with 3 indicators: 20 EMA, 50 SMA, and RSI. Find a stock where all three are giving the same signal (all bullish or all bearish).",
        topics:[
          { name:"Moving Averages", tag:"Essential", links:[
            { type:"yt", name:"Moving Averages Explained — Simple vs Exponential", url:"https://www.youtube.com/watch?v=4R2CDbw4g88" },
            { type:"yt", name:"How to Use Moving Averages to Trade — Rayner Teo", url:"https://www.youtube.com/watch?v=8pgHOFGJqWs" },
            { type:"web", name:"Investopedia: Moving Averages", url:"https://www.investopedia.com/terms/m/movingaverage.asp" },
            { type:"web", name:"TradingView — Add MAs to any chart free", url:"https://www.tradingview.com" },
          ], content:`
            <div class="lesson-block">
              <h3>What Is a Moving Average?</h3>
              <p>A moving average smooths out price data by creating a constantly updated average price over a set period. It filters out the "noise" and shows the underlying trend more clearly.</p>
              <h3>SMA vs EMA</h3>
              <ul>
                <li><strong>SMA (Simple Moving Average):</strong> Equal weight to all periods. Slower, smoother.</li>
                <li><strong>EMA (Exponential Moving Average):</strong> More weight to recent prices. Faster, more responsive to recent changes.</li>
              </ul>
              <h3>Key Moving Averages to Know</h3>
              <ul>
                <li><strong>20 EMA:</strong> Short-term trend. Swing traders use this as dynamic support/resistance.</li>
                <li><strong>50 SMA:</strong> Medium-term trend. Institutional investors watch this closely.</li>
                <li><strong>200 SMA:</strong> Long-term trend. The most watched line in all of finance. Above = bullish, below = bearish.</li>
              </ul>
              <h3>Golden Cross & Death Cross</h3>
              <ul>
                <li><strong>Golden Cross:</strong> 50 SMA crosses ABOVE 200 SMA = long-term bullish signal</li>
                <li><strong>Death Cross:</strong> 50 SMA crosses BELOW 200 SMA = long-term bearish signal</li>
              </ul>
              <div class="callout tip"><div class="callout-label">Moving Average Strategy</div><p>Buy when price pulls back to the 20 EMA in an uptrend and bounces. This is one of the cleanest, simplest swing trading strategies. Stop-loss below the 50 SMA.</p></div>
            </div>
          `, quiz:{ q:"A stock's 50-day SMA crosses above its 200-day SMA. What is this called?", opts:["Death Cross","Golden Cross","Moving Average Convergence","Bullish Divergence"], correct:1, explanation:"When the 50-day SMA crosses above the 200-day SMA, it's called a Golden Cross — traditionally seen as a long-term bullish signal indicating improving momentum." }},

          { name:"RSI — Relative Strength Index", tag:"Essential", links:[
            { type:"yt", name:"RSI Indicator Explained — How to Use It Properly", url:"https://www.youtube.com/watch?v=CBK0GbOhNtE" },
            { type:"yt", name:"RSI Divergence Trading Strategy — Rayner Teo", url:"https://www.youtube.com/watch?v=3aH6xLnB41Q" },
            { type:"web", name:"Investopedia: RSI Indicator", url:"https://www.investopedia.com/terms/r/rsi.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>What Is RSI?</h3>
              <p>The RSI is a momentum oscillator that measures the speed and magnitude of price changes. It oscillates between 0 and 100.</p>
              <h3>Key Levels</h3>
              <ul>
                <li><strong>Above 70:</strong> Overbought — stock may be due for a pullback</li>
                <li><strong>Below 30:</strong> Oversold — stock may be due for a bounce</li>
                <li><strong>50 level:</strong> Center line. Above 50 = bullish momentum, below 50 = bearish</li>
              </ul>
              <div class="callout warn"><div class="callout-label">Don't Misuse RSI</div><p>"Overbought" doesn't mean "time to sell." In a strong uptrend, RSI can stay above 70 for months. Similarly, "oversold" in a downtrend just means it's falling fast — it can keep falling.</p></div>
              <h3>RSI Divergence (More Advanced)</h3>
              <ul>
                <li><strong>Bullish Divergence:</strong> Price makes a lower low BUT RSI makes a higher low. Momentum is improving — potential reversal upward.</li>
                <li><strong>Bearish Divergence:</strong> Price makes a higher high BUT RSI makes a lower high. Momentum is weakening — potential reversal downward.</li>
              </ul>
              <div class="callout tip"><div class="callout-label">Best Use of RSI</div><p>Use RSI divergence to spot potential reversals. Use the 50 level as a trend filter — only take long trades when RSI is above 50, and short trades when below 50.</p></div>
            </div>
          `, quiz:{ q:"RSI is at 75. What does this mean?", opts:["The stock will definitely fall soon","The stock is overbought and momentum is strong — but in a strong uptrend, it can stay overbought for a long time","The stock is oversold and about to bounce","The RSI should be ignored at this level"], correct:1, explanation:"RSI above 70 signals overbought conditions, meaning momentum has been very strong. However, 'overbought' doesn't mean 'sell immediately' — in strong uptrends, RSI can stay elevated for extended periods. Context matters." }},

          { name:"MACD Indicator", tag:"Intermediate", links:[
            { type:"yt", name:"MACD Indicator Explained Simply", url:"https://www.youtube.com/watch?v=eT_9RcrOe8U" },
            { type:"yt", name:"How to Use MACD for Swing Trading", url:"https://www.youtube.com/watch?v=Zp7WyfaEhEY" },
            { type:"web", name:"Investopedia: MACD", url:"https://www.investopedia.com/terms/m/macd.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>What Is MACD?</h3>
              <p>MACD (Moving Average Convergence Divergence) is a trend-following momentum indicator. It shows the relationship between two exponential moving averages and is used to identify trend changes and momentum.</p>
              <h3>Components</h3>
              <ul>
                <li><strong>MACD Line:</strong> 12 EMA minus 26 EMA</li>
                <li><strong>Signal Line:</strong> 9 EMA of the MACD line</li>
                <li><strong>Histogram:</strong> Visual difference between MACD line and Signal line</li>
              </ul>
              <h3>MACD Signals</h3>
              <ul>
                <li><strong>Bullish Crossover:</strong> MACD line crosses ABOVE signal line = buy signal</li>
                <li><strong>Bearish Crossover:</strong> MACD line crosses BELOW signal line = sell signal</li>
                <li><strong>Zero Line Cross:</strong> MACD crossing above zero = bullish; below zero = bearish</li>
              </ul>
              <div class="callout example"><div class="callout-label">Best Use Case</div><p>MACD crossovers on the daily or weekly chart are useful for swing and position traders to confirm trend entries. The histogram growing (expanding bars) shows increasing momentum.</p></div>
              <div class="callout warn"><div class="callout-label">Lag Warning</div><p>MACD is a lagging indicator — it tells you what already happened. Never use it alone. Combine with price action and support/resistance for better entries.</p></div>
            </div>
          `, quiz:{ q:"The MACD line crosses above the signal line. This is a:", opts:["Death Cross — bearish signal","Bullish crossover — potential buy signal","Confirmation that RSI is oversold","Signal that earnings will beat expectations"], correct:1, explanation:"When the MACD line crosses above the signal line, it's a bullish crossover, traditionally interpreted as a buy signal indicating upward momentum is building." }},
        ]
      },
      { week:8, title:"Sector Rotation & Market Context", hours:8,
        task:"Visit Finviz.com and look at the sector heatmap. Identify the top 3 and bottom 3 performing sectors this week. Research WHY those sectors are moving.",
        topics:[
          { name:"The 11 Market Sectors", tag:"Essential", links:[
            { type:"yt", name:"Stock Market Sectors Explained — Which to Invest In", url:"https://www.youtube.com/watch?v=SiNHCKfTRLs" },
            { type:"yt", name:"Sector Rotation Strategy — How to Follow Smart Money", url:"https://www.youtube.com/watch?v=6tXCHMDhbNs" },
            { type:"web", name:"Finviz Sector Heatmap — Live sector performance", url:"https://finviz.com/map.ashx?t=sec" },
            { type:"web", name:"StockCharts: Sector Summary", url:"https://stockcharts.com/freecharts/sectorsummary.html" },
          ], content:`
            <div class="lesson-block">
              <h3>Why Sectors Matter</h3>
              <p>The S&P 500 is divided into 11 sectors. Different sectors perform differently at different points in the economic cycle. Knowing which sectors are leading helps you find the best stocks to trade.</p>
              <h3>The 11 GICS Sectors</h3>
              <ul>
                <li><strong>Technology (XLK):</strong> Apple, Microsoft, NVIDIA — leads bull markets, falls hard in downturns</li>
                <li><strong>Healthcare (XLV):</strong> Defensive — people need healthcare in recessions too</li>
                <li><strong>Financials (XLF):</strong> Banks, insurance — benefits from rising interest rates</li>
                <li><strong>Consumer Discretionary (XLY):</strong> Amazon, Tesla — does well when economy is strong</li>
                <li><strong>Consumer Staples (XLP):</strong> Procter & Gamble, Coca-Cola — defensive, steady in recessions</li>
                <li><strong>Energy (XLE):</strong> ExxonMobil, Chevron — tied to oil prices</li>
                <li><strong>Industrials (XLI):</strong> Boeing, Caterpillar — economic cycle sensitive</li>
                <li><strong>Utilities (XLU):</strong> Electricity companies — very defensive, like bonds</li>
                <li><strong>Materials (XLB):</strong> Mining, chemicals — tied to commodity prices</li>
                <li><strong>Real Estate (XLRE):</strong> REITs — sensitive to interest rates</li>
                <li><strong>Communication Services (XLC):</strong> Google, Meta, Netflix</li>
              </ul>
              <div class="callout tip"><div class="callout-label">Sector Rotation Strategy</div><p>Find which sector is showing the strongest relative strength (rising fastest compared to S&P 500). Then find the best individual stocks within that sector. This "top-down" approach puts the odds in your favor.</p></div>
            </div>
          `, quiz:{ q:"During a recession, which type of sectors typically outperform?", opts:["Technology and consumer discretionary","Defensive sectors like utilities, healthcare, and consumer staples","Energy and materials","All sectors fall equally in a recession"], correct:1, explanation:"Defensive sectors (utilities, healthcare, consumer staples) tend to outperform during recessions because demand for their products/services remains relatively stable even when consumers cut spending." }},

          { name:"The VIX — Fear Index", tag:"Intermediate", links:[
            { type:"yt", name:"VIX Explained — The Fear Index", url:"https://www.youtube.com/watch?v=RjYPDyz6RtM" },
            { type:"web", name:"CBOE VIX — Official VIX data and charts", url:"https://www.cboe.com/tradable_products/vix/" },
            { type:"web", name:"Investopedia: VIX", url:"https://www.investopedia.com/terms/v/vix.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>What Is the VIX?</h3>
              <p>The VIX (CBOE Volatility Index) measures the market's expectation of volatility over the next 30 days, derived from S&P 500 options prices. It's often called the "fear gauge" of Wall Street.</p>
              <h3>Reading the VIX</h3>
              <ul>
                <li><strong>VIX below 15:</strong> Very calm. Low fear. Market is complacent. Bull market territory.</li>
                <li><strong>VIX 15-25:</strong> Normal range. Moderate uncertainty.</li>
                <li><strong>VIX 25-35:</strong> Elevated fear. Market stress. Can be correction territory.</li>
                <li><strong>VIX above 40:</strong> Extreme panic. Often marks major market bottoms. (COVID 2020: VIX hit 82!)</li>
              </ul>
              <div class="callout tip"><div class="callout-label">Contrarian Signal</div><p>Extreme VIX spikes (above 40) often represent buying opportunities. When everyone is panicking, stocks are usually oversold. "Be fearful when others are greedy, and greedy when others are fearful." — Warren Buffett</p></div>
              <h3>VIX and Stock Correlation</h3>
              <p>VIX typically moves INVERSELY to the S&P 500. When stocks fall sharply, VIX spikes up. When the market is calm and rising, VIX drifts lower.</p>
            </div>
          `, quiz:{ q:"The VIX suddenly spikes to 45. What does this most likely indicate?", opts:["The market is at an all-time high","Extreme fear and panic — potentially a good contrarian buying opportunity","Interest rates are falling","All tech stocks are about to crash"], correct:1, explanation:"A VIX spike to 45 indicates extreme fear and panic in the market. Historically, such spikes have often marked near-term market bottoms and contrarian buying opportunities, as they reflect peak pessimism." }},

      { week:9, title:"Building a Trading System", hours:12,
        task:"Write out your complete trading strategy in 1-2 pages. Define exact entry rules, stop-loss rules, profit target rules, and maximum positions at once.",
        topics:[
          { name:"Building Entry & Exit Rules", tag:"Critical", links:[
            { type:"yt", name:"How to Build a Trading Plan — Step by Step", url:"https://www.youtube.com/watch?v=7KJBsGWBDvs" },
            { type:"yt", name:"Entry and Exit Rules for Traders — SMB Capital", url:"https://www.youtube.com/watch?v=3oZ4Y-w-oFg" },
            { type:"web", name:"Investopedia: How to Create a Trading Plan", url:"https://www.investopedia.com/articles/trading/04/042104.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>Why You Need Written Rules</h3>
              <p>Trading without written rules is gambling. Professional traders have a specific, documented trading plan that they follow mechanically. Emotions have no place in executing a trade plan.</p>
              <h3>Entry Rules: What Must Be True?</h3>
              <p>Your entry rule should be specific enough that you could explain it to someone else and they'd enter the same trade. Example of a good entry rule:</p>
              <div class="callout example"><div class="callout-label">Example Entry Rule</div><p>"Buy when: (1) Stock is above its 50 SMA, (2) RSI is between 40-60 after a pullback from above 60, (3) Price pulls back to the 20 EMA and forms a hammer candle, (4) Volume on the hammer is below average (orderly pullback), (5) The broader market (S&P 500) is in an uptrend."</p></div>
              <h3>Stop-Loss Rules: Where Am I Wrong?</h3>
              <p>Define this BEFORE entering the trade. Common approaches:</p>
              <ul>
                <li>Below recent swing low</li>
                <li>Below a key moving average (20 EMA, 50 SMA)</li>
                <li>Below a chart pattern (below the handle of a cup & handle)</li>
                <li>Fixed percentage (5-8% below entry for swing trades)</li>
              </ul>
              <h3>Profit Target Rules: When Do I Win?</h3>
              <ul>
                <li>Fixed R/R target (e.g., always aim for 2× or 3× your risk)</li>
                <li>Resistance level (take profits at the next major resistance)</li>
                <li>Trailing stop (move stop-loss up as price rises to lock in profits)</li>
                <li>Partial exits (sell half at 1st target, let the rest run)</li>
              </ul>
            </div>
          `, quiz:{ q:"Why should you define your stop-loss BEFORE entering a trade — not after?", opts:["Tax reasons require it","To prevent emotional decision-making when you're already in a losing position","Your broker requires it","Stop-losses only work when set before entry"], correct:1, explanation:"Setting stop-losses after entry means you'll make the decision while emotionally invested in the trade. Under pressure, you'll tend to move the stop further away ('just a bit more room') — leading to larger losses. Define it objectively before you enter." }},

          { name:"Backtesting Your Strategy", tag:"Essential", links:[
            { type:"yt", name:"How to Backtest a Trading Strategy — Step by Step", url:"https://www.youtube.com/watch?v=YqGNqQm60mI" },
            { type:"yt", name:"Manual Backtesting on TradingView — Full Tutorial", url:"https://www.youtube.com/watch?v=9vVkGEoGT7I" },
            { type:"web", name:"TradingView Strategy Tester — Free tool", url:"https://www.tradingview.com/pine-script-docs/en/v5/concepts/Strategies.html" },
          ], content:`
            <div class="lesson-block">
              <h3>What Is Backtesting?</h3>
              <p>Backtesting means applying your trading rules to historical data to see how your strategy would have performed in the past. It tells you if your edge is real before risking real money.</p>
              <h3>How to Manually Backtest</h3>
              <ul>
                <li>Go to TradingView. Choose a stock and time period.</li>
                <li>Scroll back in time (use the scroll bar to go to a past date)</li>
                <li>Apply your rules as if you're seeing the chart in real time</li>
                <li>Record every trade: entry, stop, target, result</li>
                <li>Calculate: win rate, average winner, average loser, total profit</li>
              </ul>
              <div class="formula-box">
                Expectancy = (Win Rate × Avg Win) − (Loss Rate × Avg Loss)<br>
                Positive expectancy = profitable strategy
              </div>
              <div class="callout example"><div class="callout-label">Example Backtest Result</div><p>50 trades. Win rate: 45%. Avg winner: €300. Avg loser: €150. Expectancy = (0.45×300) − (0.55×150) = 135 − 82.5 = €52.50 per trade. Positive edge confirmed.</p></div>
              <div class="callout warn"><div class="callout-label">Curve Fitting Warning</div><p>Don't backtest until your results look perfect — this is called "overfitting" and the strategy will fail in live trading. Use a separate period (out-of-sample) to validate your results.</p></div>
            </div>
          `, quiz:{ q:"What does 'positive expectancy' mean in trading?", opts:["You will win more than 50% of trades","Your strategy makes money on average per trade over many trades","You will never have a losing trade","Your maximum loss is limited"], correct:1, explanation:"Positive expectancy means your strategy is profitable on average across many trades, taking into account both wins and losses. You can have a 40% win rate and still have positive expectancy if your winners are significantly larger than your losers." }},

            { type:"web", name:"Macrotrends — Free cash flow data", url:"https://www.macrotrends.net" },
          ], content:`
            <div class="lesson-block">
              <h3>What Is Intrinsic Value?</h3>
              <p>Intrinsic value is what a company is actually worth — independent of its current market price. If a company's intrinsic value is higher than its market price, it may be undervalued (a potential buy).</p>
              <h3>Discounted Cash Flow (DCF)</h3>
              <p>The DCF is the most rigorous way to value a company. It estimates the present value of all future cash flows the business will generate.</p>
              <div class="formula-box">
                Intrinsic Value = Σ (Future Cash Flow ÷ (1 + Discount Rate)^Year)
              </div>
              <h3>The Three Inputs</h3>
              <ul>
                <li><strong>Free Cash Flow (FCF):</strong> Cash the business generates after capital expenditures</li>
                <li><strong>Growth Rate:</strong> How fast will FCF grow? (Use conservative estimates)</li>
                <li><strong>Discount Rate:</strong> The required return (usually 8-12%). Higher discount = lower value.</li>
              </ul>
              <div class="callout warn"><div class="callout-label">Garbage In, Garbage Out</div><p>DCF is only as good as your assumptions. Small changes in growth rate or discount rate cause huge swings in value. Always use conservative assumptions and check the margin of safety.</p></div>
              <div class="callout tip"><div class="callout-label">Margin of Safety</div><p>Benjamin Graham's key concept: only buy when market price is 20-30%+ BELOW your calculated intrinsic value. This buffer protects you if your estimates are slightly wrong.</p></div>
            </div>
          `, quiz:{ q:"What is a 'margin of safety' in fundamental investing?", opts:["Setting a stop-loss below your entry price","Buying a stock only when the market price is significantly below your estimate of intrinsic value","Having cash in reserve in case the market crashes","Diversifying across 20+ stocks"], correct:1, explanation:"Margin of safety means buying a stock at a significant discount to your calculated intrinsic value. If you think a company is worth €100 and buy at €70, that €30 buffer protects you if your analysis is slightly off." }},

          { name:"Growth vs Value Stocks", tag:"Essential", links:[

          ], content:`
            <div class="lesson-block">
              <h3>Value Stocks</h3>
              <p>Value stocks trade at low valuations relative to their earnings, assets, or dividends. They're often in mature, slower-growing industries. The thesis: market has temporarily underpriced a good business.</p>
              <ul>
                <li>Low P/E (often below 15x)</li>
                <li>May pay dividends</li>
                <li>Slower revenue growth</li>
                <li>Champions: Warren Buffett, Benjamin Graham</li>
                <li>Examples: Banks, utilities, consumer staples</li>
              </ul>
              <h3>Growth Stocks</h3>
              <p>Growth stocks are companies growing revenue and earnings fast, often reinvesting all profits back into the business. They trade at high valuations because investors are paying for future growth.</p>
              <ul>
                <li>High P/E (often 30-100x+)</li>
                <li>Rarely pay dividends</li>
                <li>High revenue growth (20%+)</li>
                <li>Champions: Peter Lynch, William O'Neil, Philip Fisher</li>
                <li>Examples: NVIDIA, cloud software companies, biotech</li>
              </ul>
              <div class="callout tip"><div class="callout-label">Which Is Better?</div><p>Neither is universally better. Value worked better in some decades; growth in others. Many investors blend both — finding growth companies at reasonable valuations (the GARP approach: Growth at a Reasonable Price).</p></div>
            </div>

          ], content:`
            <div class="lesson-block">
              <h3>The Earnings Season Cycle</h3>
              <p>Every quarter, publicly traded companies report their financial results. Earnings season is the most volatile period in the market — stocks can move 5-20%+ in a single day based on results.</p>
              <h3>Beat vs Miss vs In-Line</h3>
              <ul>
                <li><strong>Beat:</strong> Company reports EPS or revenue higher than analyst consensus estimate → usually stock goes up</li>
                <li><strong>Miss:</strong> Reports below consensus → usually stock falls</li>
                <li><strong>In-line:</strong> Meets expectations → often little reaction</li>
              </ul>
              <div class="callout warn"><div class="callout-label">The "Buy the Rumor, Sell the News" Trap</div><p>A stock can beat expectations and still FALL. Why? Because good news was already "priced in" — everyone expected the beat. What matters is whether results beat the WHISPER number (unofficial market expectation), not just the official consensus.</p></div>
              <h3>Guidance Is Everything</h3>
              <p>Past results matter, but forward guidance matters more. A company can report a great quarter but guide for slower growth next quarter — the stock will fall. Investors are always looking forward.</p>
              <div class="callout tip"><div class="callout-label">Best Strategy for Beginners</div><p>Avoid holding individual stocks through earnings reports until you're experienced. Earnings gaps (10-20% overnight moves) can destroy your stop-loss strategy. Instead, enter AFTER earnings if the results were good.</p></div>
            </div>
          `, quiz:{ q:"A company beats EPS estimates by 20% but lowers its guidance for next quarter. What will the stock likely do?", opts:["Rise strongly on the EPS beat","Fall — forward guidance disappointed investors","Stay flat — the beat and miss cancel out","It's impossible to predict"], correct:1, explanation:"Markets are forward-looking. Even a strong EPS beat is overshadowed by weak guidance — investors are buying future earnings, not past ones. Lowered guidance = lower future expected earnings = lower stock price." }},

          ], content:`
            <div class="lesson-block">
              <h3>What Is an Economic Moat?</h3>
              <p>A "moat" (like a castle moat) is a sustainable competitive advantage that protects a company's profits from competition. Companies with wide moats can maintain high profit margins for decades.</p>
              <h3>The 5 Types of Moats</h3>
              <ul>
                <li><strong>Brand Power:</strong> People pay premiums for Coca-Cola, LVMH, Apple. Competitors can't easily replicate a century-old brand.</li>
                <li><strong>Network Effects:</strong> The product gets better as more people use it. Facebook, Visa, Mastercard — each new user makes the network more valuable.</li>
                <li><strong>Switching Costs:</strong> It's painful or expensive to switch to a competitor. Enterprise software (SAP, Oracle), banks, Adobe. Customers stay even if they're not thrilled.</li>
                <li><strong>Cost Advantages:</strong> Company produces goods cheaper than any competitor due to scale, location, or unique processes. Amazon's logistics, ASML's monopoly on EUV machines.</li>
                <li><strong>Regulatory Moats:</strong> Licenses, patents, government approvals that competitors can't easily obtain. Pharma, defense, utilities.</li>
              </ul>
              <div class="callout tip"><div class="callout-label">Buffett's Approach</div><p>"I look for economic castles protected by unbreachable moats." Buy wonderful businesses at fair prices, then hold them for decades as the moat compounds your returns.</p></div>
              <div class="callout warn"><div class="callout-label">Moats Can Erode</div><p>Technology disruption is the greatest threat to moats. Kodak had a massive moat in film photography — digital cameras destroyed it in 10 years. Always ask: what technology could make this moat irrelevant?</p></div>
            </div>
          `, quiz:{ q:"Which of the following is the best example of a 'network effect' moat?", opts:["Coca-Cola's famous brand name","Visa's payment network — more merchants accept it because more consumers use it, and vice versa","ExxonMobil's oil reserves","A pharmaceutical company's 20-year drug patent"], correct:1, explanation:"Network effects occur when a product/service becomes more valuable as more people use it. Visa is a perfect example: merchants accept Visa because consumers carry it; consumers carry Visa because merchants accept it — a self-reinforcing cycle that's very hard to break." }},

            <div class="lesson-block">
              <h3>The Fed's Role</h3>
              <p>The Federal Reserve (or ECB in Europe) controls short-term interest rates. This is arguably the single most important variable for financial markets. When the Fed speaks, markets listen.</p>
              <h3>Rate Hikes = Bad for Stocks (Generally)</h3>
              <ul>
                <li>Higher rates → corporations pay more interest on debt → lower profits</li>
                <li>Higher rates → bonds become more attractive vs stocks → money flows to bonds</li>
                <li>Higher rates → higher "discount rate" in DCF models → lower fair value for stocks (especially growth stocks)</li>
                <li>Higher rates → consumers borrow less → slower economic growth</li>
              </ul>
              <h3>Rate Cuts = Good for Stocks (Generally)</h3>
              <ul>
                <li>Cheaper borrowing → companies invest more → higher growth → higher stock prices</li>
                <li>Bonds yield less → money flows from bonds to stocks</li>
                <li>Lower discount rates → growth stocks get a massive boost in valuation</li>
              </ul>
              <div class="callout example"><div class="callout-label">2022 Example</div><p>The Fed raised rates aggressively in 2022 to fight inflation. The S&P 500 fell ~20% and the NASDAQ (tech-heavy) fell ~35%. Growth stocks were crushed most because rising rates reduce the present value of future earnings.</p></div>
              <h3>The Yield Curve</h3>
              <p>The yield curve shows interest rates across different bond maturities. Normally, longer-term bonds have higher yields (upward sloping). When short-term rates exceed long-term rates (inverted curve), it historically predicts a recession 12-18 months ahead.</p>
            </div>

          ], content:`
            <div class="lesson-block">
              <h3>What Is Swing Trading?</h3>
              <p>Swing trading involves holding positions for multiple days to a few weeks, capturing "swings" in price — the moves between support and resistance levels. You're not a day trader (too short) or a long-term investor (too long). You're capturing the intermediate moves.</p>
              <h3>Why Swing Trading Works</h3>
              <p>Markets don't move in straight lines. They zigzag — trending, then consolidating, then trending again. Swing traders exploit this by buying near support in uptrends and selling near resistance.</p>
              <h3>Classic Swing Trading Setups</h3>
              <ul>
                <li><strong>Pullback to Moving Average:</strong> Stock in uptrend pulls back to 20 EMA, forms bullish candle, enter with stop below the EMA.</li>
                <li><strong>Breakout from Consolidation:</strong> Stock consolidates for 2-4 weeks in a tight range, then breaks out above resistance on volume.</li>
                <li><strong>Oversold Bounce:</strong> RSI drops below 30 at a key support level, look for reversal candle to enter long.</li>
              </ul>
              <div class="formula-box">
                Entry: Breakout above resistance (or bounce at support)<br>
                Stop: Below the recent swing low<br>
                Target: Next resistance level (aim for 2:1 R/R minimum)
              </div>
              <div class="callout tip"><div class="callout-label">Timing the Market</div><p>Check the overall market direction first. 75% of stocks move with the market. If the S&P 500 is in a downtrend, most swing trades will fail. Only swing trade aggressively when the broader market is in an uptrend.</p></div>
            </div>

            <div class="lesson-block">

              <ul>
                <li><strong>C — Current Earnings:</strong> EPS growth of 25%+ in the most recent quarter vs same quarter last year</li>

                <li><strong>S — Supply & Demand:</strong> Low share count (under 50M preferred). Institutional buying. Volume spikes on up days.</li>

          ], content:`
            <div class="lesson-block">
              <h3>What Is Day Trading?</h3>
              <p>Day trading means opening and closing all positions within the same trading day — no overnight holds. You're trying to profit from intraday price fluctuations.</p>
              <h3>The PDT Rule (US Markets)</h3>
              <p>If you make 4+ day trades in a 5-business-day period on a US broker with under $25,000 in your account, you violate the Pattern Day Trader (PDT) rule and will be restricted. Most European brokers don't have this restriction.</p>
              <h3>Key Day Trading Setups</h3>
              <ul>
                <li><strong>Opening Range Breakout:</strong> Mark the high and low of the first 15-30 minutes. Buy when price breaks above the opening range high with volume.</li>
                <li><strong>VWAP Trading:</strong> VWAP (Volume Weighted Average Price) acts as the day's "fair value." Buy bounces above VWAP, sell below.</li>
                <li><strong>Gap and Go:</strong> Stock gaps up 5%+ premarket on news. Buy the first pullback after the open, targeting the continuation of the gap.</li>
              </ul>
              <div class="callout warn"><div class="callout-label">Honest Warning</div><p>Studies show 70-80% of day traders lose money. The main reasons: transaction costs eat profits, emotional decision-making, and competing against professional algorithms. Don't day trade with significant capital until you've proven you can be consistently profitable on paper for 6+ months.</p></div>
              <h3>Daily Loss Limit — Non-Negotiable</h3>
              <p>Set a maximum daily loss (e.g., 2% of account). If you hit it, STOP for the day. Bad days happen. The goal is to limit damage so one bad day doesn't wipe out a week of gains.</p>
            </div>
          `, quiz:{ q:"What is the primary purpose of setting a daily loss limit when day trading?", opts:["To comply with broker regulations","To prevent one bad day from destroying a week's worth of profits and protect mental capital","To maximize tax efficiency","To ensure you only trade liquid stocks"], correct:1, explanation:"A daily loss limit stops you from revenge trading (making impulsive trades to recover losses) and protects your account from catastrophic single-day losses. Professional traders treat hitting the daily limit as a signal to stop — no exceptions." }},

      { week:17, title:"Options Trading — Part 1", hours:12,
        task:"On your paper account, buy 1 call option and 1 put option on a stock you know well. Track the price changes daily and notice how the Greeks affect your position.",
        topics:[
          { name:"Options Basics: Calls & Puts", tag:"Advanced", links:[
            { type:"yt", name:"Options Trading for Beginners — Full Course", url:"https://www.youtube.com/watch?v=4HMm6mBvGKE" },
            { type:"yt", name:"Call Options vs Put Options Explained Simply", url:"https://www.youtube.com/watch?v=VJgHkAqohbU" },
            { type:"web", name:"Options Playbook — Free complete options guide", url:"https://www.optionsplaybook.com" },
            { type:"web", name:"Tastytrade — Free options education videos", url:"https://tastytrade.com/learn/" },
          ], content:`
            <div class="lesson-block">
              <h3>What Are Options?</h3>
              <p>An option is a contract that gives you the RIGHT (but not obligation) to buy or sell a stock at a specific price (strike price) before a specific date (expiration).</p>
              <h3>Call Options</h3>
              <p>A call option gives you the right to BUY 100 shares at the strike price. You buy calls when you're BULLISH — expecting the stock to rise.</p>
              <div class="callout example"><div class="callout-label">Call Example</div><p>Stock at €100. You buy a €110 call expiring in 30 days for €3 (premium). If stock rises to €125 before expiration, your €110 call is worth at least €15. You paid €3, now worth €15 = 400% gain. If stock stays below €110, your €3 is gone.</p></div>
              <h3>Put Options</h3>
              <p>A put option gives you the right to SELL 100 shares at the strike price. You buy puts when you're BEARISH — expecting the stock to fall. Puts are also used as insurance (hedging) on stocks you own.</p>
              <div class="callout example"><div class="callout-label">Put Example</div><p>Stock at €100. You buy a €90 put for €2. If stock crashes to €70, your €90 put is worth at least €20. 10× your money. But if stock stays above €90, your €2 is gone.</p></div>
              <h3>Key Advantage of Options</h3>
              <p>Maximum loss is limited to the premium paid. You can never lose more than what you paid for the option.</p>
              <div class="callout warn"><div class="callout-label">Time Decay Warning</div><p>Options lose value every day just from time passing (theta decay). You can be right about the direction but still lose money if the move happens too slowly. Timing matters enormously with options.</p></div>
            </div>
          `, quiz:{ q:"You buy a put option on a stock. When do you profit?", opts:["When the stock rises above the strike price","When the stock falls below the strike price","When the stock stays exactly at the strike price","When the company pays a dividend"], correct:1, explanation:"Put options increase in value when the underlying stock falls. You profit when the stock falls below your strike price. Put options are either used speculatively (betting on a decline) or as portfolio insurance (protecting against a fall in stocks you own)." }},

          { name:"The Greeks — Delta, Theta, Vega", tag:"Advanced", links:[
            { type:"yt", name:"Options Greeks Explained — Delta Theta Vega Gamma", url:"https://www.youtube.com/watch?v=kCJcEOiuXHs" },
            { type:"yt", name:"Theta Decay Explained — Why Options Lose Value Daily", url:"https://www.youtube.com/watch?v=yr7S4iyldkE" },
            { type:"web", name:"Investopedia: Options Greeks", url:"https://www.investopedia.com/trading/getting-to-know-the-greeks/" },
            { type:"web", name:"Tastytrade: Understanding the Greeks", url:"https://tastytrade.com/learn/greeks/" },
          ], content:`
            <div class="lesson-block">
              <h3>Why the Greeks Matter</h3>
              <p>Options don't just move based on stock price. Multiple factors affect their value. The "Greeks" measure sensitivity to each factor.</p>
              <h3>Delta (Δ) — Price Sensitivity</h3>
              <p>Delta measures how much an option's price changes for every €1 move in the stock.</p>
              <ul>
                <li>Call options: Delta between 0 and 1 (positive)</li>
                <li>Put options: Delta between -1 and 0 (negative)</li>
                <li>At-the-money options: Delta ≈ 0.50</li>
                <li>Deep in-the-money: Delta ≈ 1.0 (moves almost like the stock)</li>
              </ul>
              <div class="callout example"><div class="callout-label">Delta Example</div><p>You own a call with delta of 0.50. If the stock rises €2, your option rises approximately €1 (0.50 × €2).</p></div>
              <h3>Theta (Θ) — Time Decay</h3>
              <p>Theta is the amount an option loses in value each day just from time passing. This is why buying options is hard — you're fighting time decay every day.</p>
              <div class="formula-box">Option value = Intrinsic Value + Time Value (which decays daily)</div>
              <h3>Vega (V) — Volatility Sensitivity</h3>
              <p>Vega measures sensitivity to changes in implied volatility (IV). When IV spikes (market panic), all option prices rise. When IV drops (calm market), option prices fall — even if the stock doesn't move.</p>
              <div class="callout tip"><div class="callout-label">Practical Application</div><p>Buy options when implied volatility is LOW (they're cheap). Sell options when implied volatility is HIGH (they're expensive). Avoid buying options before earnings when IV is already elevated — you'll often lose even if the stock moves your way.</p></div>
            </div>
          `, quiz:{ q:"You buy a call option. Every day that passes, even if the stock doesn't move, your option loses some value. Which Greek describes this?", opts:["Delta","Gamma","Vega","Theta"], correct:3, explanation:"Theta is time decay — the daily erosion of an option's time value. As expiration approaches, options lose value faster (theta accelerates near expiration). This is why options buyers must be right about direction AND timing." }},
        ]
      },
      { week:18, title:"Options Trading — Part 2", hours:12,

        topics:[

            { type:"web", name:"Tastytrade: Covered Calls Guide", url:"https://tastytrade.com/learn/covered-call/" },
            { type:"web", name:"Options Playbook: Cash-Secured Puts", url:"https://www.optionsplaybook.com/option-strategies/cash-secured-puts/" },
          ], content:`
            <div class="lesson-block">
              <h3>Covered Calls — Income Strategy</h3>
              <p>A covered call means you own 100 shares of a stock AND sell a call option against those shares. You collect premium income. In exchange, you cap your upside.</p>
              <div class="callout example"><div class="callout-label">Example</div><p>You own 100 ASML shares at €900. You sell a €950 call expiring in 30 days for €15 premium (€1,500 collected). If ASML stays below €950, you keep the €1,500 and your shares. If it rises above €950, your shares are "called away" at €950 — you still profit but miss gains above €950.</p></div>
              <h3>Cash-Secured Puts — Income + Discount Buying</h3>
              <p>You sell a put option and set aside cash to buy the shares if assigned. You either collect premium (if stock stays above strike) or buy shares at a discount.</p>
              <div class="callout example"><div class="callout-label">Example</div><p>ASML is at €900. You sell a €860 put for €12 (€1,200 premium). If ASML stays above €860, you keep €1,200. If it falls below €860, you're "put" the shares — effectively buying at €860 - €12 = €848. You wanted to own it anyway, now you got a discount!</p></div>
              <div class="callout tip"><div class="callout-label">The Wheel Strategy</div><p>Sell cash-secured puts until you get assigned (own the stock). Then sell covered calls until the stock is called away. Repeat. This generates consistent income from stocks you're happy to own.</p></div>
            </div>
          `, quiz:{ q:"You sell a covered call. The stock rallies 40% above your strike price. What happens to your position?", opts:["You profit 40% on the move","Your shares are called away at the strike price — you miss the gains above the strike","You lose money on the shares","Your option automatically rolls to a higher strike"], correct:1, explanation:"When you sell a covered call and the stock rises above the strike, the call buyer exercises their right to buy your shares at the strike price. You keep the premium and make money up to the strike, but miss all gains above it — that's the trade-off of the covered call strategy." }},
        ]

          ], content:`
            <div class="lesson-block">
              <h3>Why Most Traders Fail Psychologically</h3>
              <p>The market is specifically designed (through the behavior of millions of participants) to trigger your worst instincts. It makes you buy high (when everyone is excited) and sell low (when everyone is panicking).</p>
              <h3>FOMO — Fear of Missing Out</h3>
              <p>You see a stock up 40% and buy it near the top because you're afraid of missing more gains. Then it reverses and you lose money. FOMO buying almost always ends badly.</p>
              <div class="callout warn"><div class="callout-label">The FOMO Fix</div><p>There will ALWAYS be another trade. Missing one opportunity is meaningless. Keep a watchlist and wait for your specific setup. Chasing is the #1 way beginners lose money.</p></div>
              <h3>Revenge Trading</h3>
              <p>You have a losing trade. Your ego can't accept it. You immediately make another trade to "win back" the loss — impulsively and without your usual analysis. The second trade is almost always worse.</p>
              <h3>Overconfidence After Winning Streaks</h3>
              <p>After 5 winning trades, you feel invincible. You increase size, take lower-quality setups, or ignore risk management. Then one bad trade wipes out weeks of gains.</p>
              <div class="callout tip"><div class="callout-label">Mark Douglas's Insight</div><p>"The best traders have a mindset that expects random distribution of wins and losses. They don't get euphoric on wins or devastated by losses. They focus purely on executing their process correctly." — Trading in the Zone</p></div>
              <h3>The Process Focus</h3>
              <p>Judge yourself on whether you followed your rules — not on the outcome. A trade that follows your rules perfectly but loses money is a GOOD trade. A trade that ignores your rules but wins is a BAD trade. Focus on the process, the outcomes will follow.</p>

      { week:22, title:"Developing Your Edge", hours:12,
        task:"Backtest your primary strategy on 6 months of historical data. Calculate expectancy per trade. If positive, great — continue refining. If negative, identify what's broken.",
        topics:[
          { name:"Finding and Testing Your Edge", tag:"Critical", links:[
            { type:"yt", name:"What Is a Trading Edge and How to Find Yours", url:"https://www.youtube.com/watch?v=O_JLTm7LZDY" },
            { type:"yt", name:"How to Calculate Trading Expectancy", url:"https://www.youtube.com/watch?v=rJVa-fXWmpA" },
            { type:"web", name:"Investopedia: Trading Edge", url:"https://www.investopedia.com/articles/trading/02/111302.asp" },

          ], content:`
            <div class="lesson-block">
              <h3>What Is a Trading Edge?</h3>
              <p>An edge is a statistically demonstrable advantage — your strategy makes more money than it loses over a large sample of trades. Without an edge, you're essentially gambling.</p>
              <h3>How to Calculate Expectancy</h3>
              <div class="formula-box">
                Expectancy = (Win Rate × Avg Win) - (Loss Rate × Avg Loss)<br><br>
                Example: 50% win rate, €200 avg win, €100 avg loss:<br>
                (0.50 × €200) - (0.50 × €100) = €100 - €50 = €50 per trade
              </div>
              <h3>Your Setup Must Be Specific</h3>
              <p>Edges exist in specific, narrow contexts — not broadly. "I buy good stocks" is not an edge. "I buy stocks breaking out of 6-week cup and handle bases with RS above 90 and volume 200%+ above average when the market is in a confirmed uptrend" — that is a specific setup you can test.</p>
              <div class="callout tip"><div class="callout-label">Van Tharp's R-Multiple</div><p>Measure all trades in units of R (initial risk). A 2R win means you made 2× your risk. Track your average R-multiple across trades. Any positive average R over 50+ trades = edge.</p></div>
              <h3>Sample Size Matters</h3>
              <p>You need at least 50-100 trades to have statistical confidence in your results. 10 winning trades proves nothing — it could be luck. 80 trades with consistent positive expectancy is real evidence of an edge.</p>
              <div class="callout warn"><div class="callout-label">Patience</div><p>Most traders take years to find and refine a genuine edge. The traders who make it long-term treat trading as a serious craft requiring constant study, journaling, and improvement. There are no shortcuts.</p></div>
            </div>
          `, quiz:{ q:"You've tested your strategy on 15 trades and all were winners. Do you have a proven edge?", opts:["Yes — 100% win rate is definitive proof","No — 15 trades is far too small a sample size to distinguish skill from luck","Yes — if you can repeat it 3 more times","No — you need to win 100 consecutive trades"], correct:1, explanation:"15 trades is a far too small sample to prove anything. Statistically, even a random strategy could get 15 consecutive wins by chance. You need a minimum of 50-100+ trades to have any statistical confidence that your results represent a genuine edge." }},

// ===================== STATE =====================
let currentView = 'home';
let currentWeek = null;
let completed = new Set(JSON.parse(localStorage.getItem('ta_completed') || '[]'));
let sidebarOpen = false;

function save() { localStorage.setItem('ta_completed', JSON.stringify([...completed])); }

function getPhaseColor(weekNum) {
  for (const p of phases) {
    for (const w of p.weeks) {
      if (w.week === weekNum) return p.color;
    }
  }
  return '#C8A96E';
}

function getWeekData(weekNum) {
  for (const p of phases) {
    for (const w of p.weeks) {
      if (w.week === weekNum) return { phase: p, week: w };
    }
  }
  return null;
}

// ===================== RENDER SIDEBAR =====================
function renderSidebar() {
  const totalWeeks = 26;
  const pct = Math.round((completed.size / totalWeeks) * 100);
  let html = `
    <div class="sidebar-header">
      <div class="sidebar-logo">Trading Academy</div>
      <div class="sidebar-title" style="cursor:pointer" onclick="navigate('home')">Complete Course</div>
      <div class="sidebar-progress">
        <div class="sidebar-progress-track"><div class="sidebar-progress-fill" style="width:${pct}%"></div></div>
        <div class="sidebar-progress-label"><span>${completed.size}/26 weeks</span><span>${pct}%</span></div>
      </div>
    </div>
  `;
  for (const p of phases) {
    const isOpen = currentWeek && p.weeks.some(w => w.week === currentWeek?.week);
    html += `
      <div class="phase-section">
        <div class="phase-heading ${isOpen ? 'open' : ''}" onclick="this.classList.toggle('open'); this.nextElementSibling.style.display = this.classList.contains('open') ? 'block' : 'none'">
          <span class="phase-heading-icon" style="color:${p.color}">${p.icon}</span>
          <span class="phase-heading-text" style="color:${isOpen ? p.color : ''}">${p.title}</span>
          <span class="phase-heading-chevron">▼</span>
        </div>
        <div class="phase-weeks" style="display:${isOpen ? 'block' : 'none'}">
          ${p.weeks.map(w => `
            <div class="week-link ${currentWeek && currentWeek.week === w.week ? 'active' : ''}" onclick="navigate('week', ${w.week})">
              <div class="week-link-num ${completed.has(w.week) ? 'done' : ''}" style="${completed.has(w.week) ? `background:${p.color};border-color:${p.color}` : ''}">
                ${completed.has(w.week) ? '✓' : w.week}
              </div>
              <div class="week-link-name">${w.title}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  document.getElementById('sidebar').innerHTML = html;
}

// ===================== RENDER MAIN =====================
function renderMain() {
  if (currentView === 'home') {
    renderHome();
  } else if (currentView === 'week') {
    renderWeek();
  }
}

function renderHome() {
  const totalHours = phases.reduce((s, p) => s + p.weeks.reduce((ss, w) => ss + w.hours, 0), 0);
  let html = `<div class="home-page">
    <div class="hero-eyebrow">Complete Trading Education</div>
    <h1>Trading Academy</h1>
    <p class="hero-sub">Everything you need to go from complete beginner to confident, profitable trader. 26 weeks of structured learning with full lessons, interactive quizzes, and practical tasks.</p>
    <div class="stats-row">
      <div class="stat"><div class="stat-val">6</div><div class="stat-lbl">Phases</div></div>
      <div class="stat"><div class="stat-val">26</div><div class="stat-lbl">Weeks</div></div>
      <div class="stat"><div class="stat-val">${totalHours}</div><div class="stat-lbl">Study Hours</div></div>
      <div class="stat"><div class="stat-val">${phases.reduce((s,p)=>s+p.weeks.reduce((ss,w)=>ss+w.topics.length,0),0)}</div><div class="stat-lbl">Full Lessons</div></div>
      <div class="stat"><div class="stat-val">${completed.size}/26</div><div class="stat-lbl">Completed</div></div>
    </div>
    <div style="margin-bottom:24px; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:5px; color:var(--text4); text-transform:uppercase">Choose a Phase to Begin</div>
    <div class="phases-grid">
      ${phases.map(p => `
        <div class="phase-card" onclick="navigate('week', ${p.weeks[0].week})" style="border-top: 3px solid ${p.color}30">
          <div class="phase-card-icon" style="color:${p.color}">${p.icon}</div>
          <div class="phase-card-num" style="color:${p.color}">Phase ${p.id} · ${p.sub}</div>
          <div class="phase-card-title">${p.title}</div>
          <div class="phase-card-weeks">${p.weeks.length} weeks · ~${p.weeks.reduce((s,w)=>s+w.hours,0)} hours · ${p.weeks.reduce((s,w)=>s+w.topics.length,0)} lessons</div>
        </div>
      `).join('')}
    </div>
  </div>`;
  document.getElementById('main').innerHTML = html;
  window.scrollTo(0,0);
}

function renderWeek() {
  const { phase, week } = currentWeek;
  const color = phase.color;
  // Find prev/next week
  let allWeeks = [];
  for (const p of phases) for (const w of p.weeks) allWeeks.push(w.week);
  const idx = allWeeks.indexOf(week.week);
  const prevWeek = idx > 0 ? allWeeks[idx-1] : null;
  const nextWeek = idx < allWeeks.length-1 ? allWeeks[idx+1] : null;
  const isDone = completed.has(week.week);

  let html = `<div class="week-page">
    <div class="week-breadcrumb" onclick="navigate('home')">← Back to Overview</div>
    <div class="week-eyebrow" style="color:${color}">Phase ${phase.id}: ${phase.title} &nbsp;·&nbsp; ${phase.sub}</div>
    <h1 class="week-title">Week ${week.week}: ${week.title}</h1>
    <div class="week-meta">
      <span>⏱ ~${week.hours} study hours</span>
      <span>📚 ${week.topics.length} lessons</span>
      ${isDone ? `<span style="color:${color}">✓ Completed</span>` : ''}
    </div>
    <div class="topics-section-title">Lessons — Click to Learn</div>
    <div class="topic-cards">
      ${week.topics.map((t, i) => `
        <div class="topic-card" id="tc-${week.week}-${i}">
          <div class="topic-card-header" onclick="toggleTopic('tc-${week.week}-${i}')">
            <div class="topic-card-icon" style="background:${color}20; color:${color}">${i+1}</div>
            <div class="topic-card-name">${t.name}</div>
            <div class="topic-card-tag" style="background:${color}">${t.tag}</div>
            <div class="topic-card-chevron">▼</div>
          </div>
          <div class="topic-body">
            <div class="topic-content">
              ${t.content}
              ${t.links && t.links.length ? `
                <div class="resources-section">
                  <div class="resources-title" style="color:${color}">Resources & Further Learning</div>
                  <div class="resource-links">
                    ${t.links.map(l => `
                      <a class="resource-link" href="${l.url}" target="_blank" rel="noopener">
                        <div class="resource-link-icon ${l.type}">${l.type === 'yt' ? '▶' : l.type === 'book' ? '📖' : '🔗'}</div>
                        <div class="resource-link-info">
                          <div class="resource-link-name">${l.name}</div>
                          <div class="resource-link-type">${l.type === 'yt' ? 'YouTube Video' : l.type === 'book' ? 'Book / Article' : 'Website'}</div>
                        </div>
                        <div class="resource-link-arrow">↗</div>
                      </a>
                    `).join('')}
                  </div>
                </div>
              ` : ''}
              <div class="quiz-section">
                <div class="quiz-title" style="color:${color}">Knowledge Check</div>
                <div class="quiz-q">${t.quiz.q}</div>
                <div class="quiz-options">
                  ${t.quiz.opts.map((o, oi) => `
                    <div class="quiz-opt" id="qopt-${week.week}-${i}-${oi}" onclick="answerQuiz(${week.week}, ${i}, ${oi}, ${t.quiz.correct}, '${t.quiz.explanation.replace(/'/g,"\\'")}')">
                      ${String.fromCharCode(65+oi)}. ${o}
                    </div>
                  `).join('')}
                </div>
                <div class="quiz-feedback" id="qfb-${week.week}-${i}"></div>
              </div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="task-box" style="background:${color}15; border:1px solid ${color}40">
      <div class="task-label" style="color:${color}">Weekly Practical Task</div>
      <div class="task-text">${week.task}</div>
    </div>
    <button class="complete-btn" id="complete-btn" onclick="toggleComplete(${week.week})" style="color:${isDone ? '#0A0A0B' : color}; border-color:${color}; background:${isDone ? color : 'transparent'}">
      ${isDone ? '✓ Completed' : 'Mark Week as Complete'}
    </button>
    <div class="week-nav">
      ${prevWeek ? `<div class="nav-btn" onclick="navigate('week', ${prevWeek})">← Week ${prevWeek}</div>` : '<div></div>'}
      ${nextWeek ? `<div class="nav-btn" onclick="navigate('week', ${nextWeek})">Week ${nextWeek} →</div>` : '<div></div>'}
    </div>
  </div>`;
  document.getElementById('main').innerHTML = html;
  window.scrollTo(0,0);
}

// ===================== ACTIONS =====================
function toggleTopic(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}

function answerQuiz(weekNum, topicIdx, selectedIdx, correctIdx, explanation) {
  // Disable all options
  for (let i = 0; i < 4; i++) {
    const el = document.getElementById(`qopt-${weekNum}-${topicIdx}-${i}`);
    if (el) {
      el.style.pointerEvents = 'none';
      if (i === correctIdx) el.classList.add('correct');
      else if (i === selectedIdx && selectedIdx !== correctIdx) el.classList.add('wrong');
    }
  }
  const fb = document.getElementById(`qfb-${weekNum}-${topicIdx}`);
  if (fb) {
    const isCorrect = selectedIdx === correctIdx;
    fb.className = `quiz-feedback show ${isCorrect ? 'good' : 'bad'}`;
    fb.textContent = (isCorrect ? '✓ Correct! ' : '✗ Not quite. ') + explanation;
  }
}

function toggleComplete(weekNum) {
  if (completed.has(weekNum)) {
    completed.delete(weekNum);
  } else {
    completed.add(weekNum);
  }
  save();
  renderSidebar();
  renderMain();
}

function navigate(view, weekNum) {
  if (view === 'home') {
    currentView = 'home';
    currentWeek = null;
  } else if (view === 'week') {
    currentView = 'week';
    currentWeek = getWeekData(weekNum);
  }
  renderSidebar();
  renderMain();
  if (sidebarOpen) toggleSidebar();
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.getElementById('overlay').classList.toggle('show', sidebarOpen);
}

// Init
renderSidebar();
renderMain();
</script>

</html>
