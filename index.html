<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Academy — Complete 26-Week Course</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400;500&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #09090A; --bg2: #0D0C0F; --bg3: #111013; --bg4: #161418;
  --border: #1E1B20; --border2: #2A2630;
  --text: #EAE2D8; --text2: #A09888; --text3: #6A6258; --text4: #3A3830;
  --gold: #C8A96E; --blue: #6E9CC8; --green: #6EC897; --pink: #C86E9C; --purple: #9C6EC8; --orange: #C8896E;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; min-height: 100vh; }

/* LAYOUT */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 280px; min-width: 280px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; z-index: 100; transition: transform 0.3s; }
.main { margin-left: 280px; flex: 1; min-height: 100vh; }

/* SIDEBAR */
.sidebar-header { padding: 28px 20px 20px; border-bottom: 1px solid var(--border); }
.sidebar-logo { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
.sidebar-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; color: var(--text); }
.sidebar-progress { margin-top: 14px; }
.sidebar-progress-track { height: 2px; background: var(--border2); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.sidebar-progress-fill { height: 100%; background: var(--gold); transition: width 0.4s; }
.sidebar-progress-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--text4); display: flex; justify-content: space-between; }

.phase-section { border-bottom: 1px solid var(--border); }
.phase-heading { padding: 14px 20px 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; user-select: none; }
.phase-heading:hover { background: var(--bg3); }
.phase-heading-icon { font-size: 12px; font-family: 'DM Mono', monospace; }
.phase-heading-text { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; flex: 1; }
.phase-heading-chevron { font-size: 8px; color: var(--text4); transition: transform 0.2s; }
.phase-heading.open .phase-heading-chevron { transform: rotate(180deg); }
.phase-weeks { display: none; padding-bottom: 8px; }
.phase-heading.open + .phase-weeks { display: block; }

.week-link { display: flex; align-items: center; gap: 10px; padding: 7px 20px 7px 32px; cursor: pointer; transition: background 0.15s; }
.week-link:hover { background: var(--bg3); }
.week-link.active { background: var(--bg4); }
.week-link-num { width: 20px; height: 20px; border-radius: 50%; border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text4); flex-shrink: 0; transition: all 0.2s; }
.week-link-num.done { font-size: 10px; color: var(--bg); }
.week-link-name { font-size: 13px; color: var(--text3); line-height: 1.3; }
.week-link.active .week-link-name { color: var(--text2); }

/* MAIN CONTENT */
.home-page { padding: 60px 48px; max-width: 900px; }
.hero-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; margin-bottom: 18px; }
.hero-title { font-family: 'Playfair Display', serif; font-size: clamp(40px, 5vw, 72px); font-weight: 400; line-height: 1.05; letter-spacing: -1px; color: var(--text); margin-bottom: 16px; }
.hero-sub { font-size: 20px; color: var(--text3); font-style: italic; margin-bottom: 48px; line-height: 1.6; }
.stats-row { display: flex; gap: 48px; flex-wrap: wrap; margin-bottom: 56px; }
.stat { }
.stat-val { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 300; color: var(--gold); }
.stat-lbl { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--text4); text-transform: uppercase; margin-top: 4px; }

.phases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
.phase-card { border: 1px solid var(--border); border-radius: 4px; padding: 24px; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: var(--bg2); }
.phase-card:hover { background: var(--bg3); }
.phase-card-icon { font-size: 28px; margin-bottom: 14px; font-family: 'DM Mono', monospace; }
.phase-card-num { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
.phase-card-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; color: var(--text); margin-bottom: 6px; }
.phase-card-weeks { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; color: var(--text4); }

/* WEEK PAGE */
.week-page { padding: 48px 48px 100px; max-width: 900px; }
.week-breadcrumb { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--text4); margin-bottom: 24px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.week-breadcrumb:hover { color: var(--text3); }
.week-eyebrow { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; }
.week-title { font-family: 'Playfair Display', serif; font-size: clamp(28px, 4vw, 48px); font-weight: 400; line-height: 1.1; color: var(--text); margin-bottom: 10px; }
.week-meta { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; color: var(--text4); margin-bottom: 40px; display: flex; gap: 24px; flex-wrap: wrap; }
.week-meta span { display: flex; align-items: center; gap: 6px; }

.topics-section-title { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: var(--text4); margin-bottom: 16px; }

.topic-cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 40px; }
.topic-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--bg2); transition: border-color 0.2s; }
.topic-card.open { border-color: var(--border2); }
.topic-card-header { padding: 16px 20px; cursor: pointer; display: flex; align-items: center; gap: 14px; }
.topic-card-header:hover { background: var(--bg3); }
.topic-card-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; font-family: 'DM Mono', monospace; }
.topic-card-name { flex: 1; font-size: 17px; color: var(--text2); }
.topic-card.open .topic-card-name { color: var(--text); }
.topic-card-tag { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; padding: 3px 8px; border-radius: 20px; color: var(--bg); text-transform: uppercase; }
.topic-card-chevron { font-size: 9px; color: var(--text4); transition: transform 0.2s; }
.topic-card.open .topic-card-chevron { transform: rotate(180deg); }

.topic-body { display: none; border-top: 1px solid var(--border); }
.topic-card.open .topic-body { display: block; }
.topic-content { padding: 28px 28px 32px; }

.lesson-block { margin-bottom: 28px; }
.lesson-block h3 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; color: var(--text); margin-bottom: 12px; }
.lesson-block p { font-size: 16px; color: var(--text2); line-height: 1.8; margin-bottom: 12px; }
.lesson-block ul { padding-left: 0; list-style: none; }
.lesson-block ul li { font-size: 15px; color: var(--text2); line-height: 1.7; padding-left: 18px; position: relative; margin-bottom: 6px; }
.lesson-block ul li::before { content: '—'; position: absolute; left: 0; color: var(--text4); }

.callout { border-radius: 4px; padding: 16px 20px; margin: 16px 0; }
.callout.tip { background: #6EC89715; border-left: 3px solid var(--green); }
.callout.warn { background: #C8A96E15; border-left: 3px solid var(--gold); }
.callout.example { background: #6E9CC815; border-left: 3px solid var(--blue); }
.callout-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
.callout p { font-size: 14px; line-height: 1.7; margin: 0; }

.formula-box { background: var(--bg4); border: 1px solid var(--border2); border-radius: 4px; padding: 16px 20px; margin: 14px 0; font-family: 'DM Mono', monospace; font-size: 14px; color: var(--gold); letter-spacing: 1px; }

.quiz-section { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
.quiz-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; }
.quiz-q { font-size: 16px; color: var(--text); margin-bottom: 14px; line-height: 1.5; }
.quiz-options { display: flex; flex-direction: column; gap: 8px; }
.quiz-opt { padding: 12px 16px; border: 1px solid var(--border2); border-radius: 4px; cursor: pointer; font-size: 14px; color: var(--text2); transition: all 0.2s; background: var(--bg3); }
.quiz-opt:hover { border-color: var(--text3); color: var(--text); }
.quiz-opt.correct { border-color: var(--green); background: #6EC89720; color: var(--green); }
.quiz-opt.wrong { border-color: #C86E6E; background: #C86E6E20; color: #C86E6E; }
.quiz-feedback { margin-top: 12px; font-size: 14px; padding: 12px 16px; border-radius: 4px; display: none; line-height: 1.6; }
.quiz-feedback.show { display: block; }
.quiz-feedback.good { background: #6EC89715; color: var(--green); border: 1px solid #6EC89740; }
.quiz-feedback.bad { background: #C86E6E15; color: #C86E6E; border: 1px solid #C86E6E40; }

/* TASK BOX */
.task-box { border-radius: 4px; padding: 20px 24px; margin-top: 32px; }
.task-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 10px; }
.task-text { font-size: 16px; color: var(--text); line-height: 1.7; }

/* COMPLETE BTN */
.complete-btn { margin-top: 32px; padding: 14px 32px; border-radius: 3px; border: 1px solid; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; background: transparent; }
.complete-btn:hover { opacity: 0.8; }

/* NAV ARROWS */
.week-nav { display: flex; gap: 12px; margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--border); }
.nav-btn { flex: 1; padding: 14px 20px; border: 1px solid var(--border2); border-radius: 3px; background: var(--bg2); cursor: pointer; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--text3); transition: all 0.2s; text-align: center; }
.nav-btn:hover { background: var(--bg3); color: var(--text2); border-color: var(--text4); }

/* MOBILE */
.menu-toggle { display: none; position: fixed; top: 16px; left: 16px; z-index: 200; background: var(--bg2); border: 1px solid var(--border2); border-radius: 4px; padding: 8px 12px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 99; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .menu-toggle { display: block; }
  .sidebar-overlay.show { display: block; }
  .home-page, .week-page { padding: 60px 20px 80px; }
  .stats-row { gap: 28px; }
  .phases-grid { grid-template-columns: 1fr; }
}

/* Scrollbar */
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* RESOURCE LINKS */
.resources-section { margin-top: 28px; padding-top: 24px; border-top: 1px solid var(--border); }
.resources-title { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 14px; }
.resource-links { display: flex; flex-direction: column; gap: 8px; }
.resource-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 1px solid var(--border2); border-radius: 4px; background: var(--bg3); text-decoration: none; transition: all 0.2s; }
.resource-link:hover { border-color: var(--text3); background: var(--bg4); }
.resource-link-icon { width: 28px; height: 28px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.resource-link-icon.yt { background: #FF000020; color: #FF4444; }
.resource-link-icon.web { background: #6E9CC820; color: var(--blue); }
.resource-link-icon.book { background: #C8A96E20; color: var(--gold); }
.resource-link-info { flex: 1; }
.resource-link-name { font-size: 14px; color: var(--text2); line-height: 1.3; }
.resource-link-type { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--text4); text-transform: uppercase; margin-top: 2px; }
.resource-link-arrow { color: var(--text4); font-size: 12px; }
</style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">☰ MENU</button>
<div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="app">
<aside class="sidebar" id="sidebar"></aside>
<main class="main" id="main"></main>
</div>

<script>
// ===================== DATA =====================
const phases = [
  {
    id:1, title:"Foundation", sub:"Weeks 1–4", color:"#C8A96E", icon:"◈",
    weeks:[
      { week:1, title:"How Markets Work", hours:8,
        task:"Open a paper trading account on Thinkorswim or Webull and place your first fake trade.",
        topics:[
          { name:"What is the Stock Market?", tag:"Beginner", links:[
            { type:"yt", name:"How The Stock Market Works — Explained Simply", url:"https://www.youtube.com/watch?v=p7HKvqRI_Bo" },
            { type:"yt", name:"Stock Market For Beginners 2024 — Andrei Jikh", url:"https://www.youtube.com/watch?v=86rPbNMHPBI" },
            { type:"web", name:"Investopedia: How the Stock Market Works", url:"https://www.investopedia.com/articles/investing/082614/how-stock-market-works.asp" },
          ], content: `
            <div class="lesson-block">
              <h3>The Stock Market Explained Simply</h3>
              <p>The stock market is a marketplace where buyers and sellers trade shares of publicly listed companies. Think of it like a giant auction that runs every weekday from 9:30 AM to 4:00 PM Eastern Time.</p>
              <p>When a company wants to raise money, it can "go public" by listing shares on a stock exchange. Each share represents a tiny ownership stake in that company. When you buy a share of Apple, you literally own a small piece of Apple Inc.</p>
              <div class="callout tip"><div class="callout-label">Key Insight</div><p>The stock market is NOT a casino. Prices move based on the real performance and future expectations of businesses. Short-term it can be chaotic, but long-term prices follow the actual value of the underlying company.</p></div>
              <h3>The Two Main Exchanges</h3>
              <ul>
                <li><strong>NYSE (New York Stock Exchange)</strong> — The world's largest stock exchange by market cap. Home to companies like Coca-Cola, JPMorgan, and ExxonMobil. Located on Wall Street.</li>
                <li><strong>NASDAQ</strong> — Tech-heavy exchange. Home to Apple, Microsoft, Amazon, Google, Meta. Fully electronic — no trading floor.</li>
              </ul>
              <h3>How Prices Move</h3>
              <p>Stock prices change based on supply and demand. If more people want to buy a stock than sell it, the price goes up. If more people want to sell, the price goes down. What drives those buying and selling decisions? Mainly: company earnings, economic conditions, news, and investor sentiment.</p>
              <div class="callout example"><div class="callout-label">Real Example</div><p>When Apple reports record iPhone sales, investors get excited and want to buy more Apple shares. More buyers = higher price. When a company misses its earnings expectations, investors sell = lower price.</p></div>
            </div>
          `, quiz:{ q:"What does owning a stock actually mean?", opts:["You are lending money to a company","You own a small piece of that company","You have the right to work at the company","You are guaranteed a fixed return"], correct:1, explanation:"A stock (also called a share or equity) represents actual ownership in a company. Shareholders are part-owners of the business." }},

          { name:"Stocks, Bonds, ETFs & Mutual Funds", tag:"Beginner", links:[
            { type:"yt", name:"Stocks vs Bonds vs ETFs — What's the Difference?", url:"https://www.youtube.com/watch?v=1pFHNqFpL_4" },
            { type:"yt", name:"ETF Explained for Beginners — Plain Bagel", url:"https://www.youtube.com/watch?v=eklNh2-g9hQ" },
            { type:"web", name:"Investopedia: ETF vs Mutual Fund", url:"https://www.investopedia.com/articles/exchangetradedfunds/08/etf-mutual-fund-difference.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>The 4 Main Investment Types</h3>
              <p>Before you invest a single euro, you need to understand the basic building blocks of investing:</p>
              <h3>1. Stocks (Equities)</h3>
              <p>Ownership in a company. High potential returns but higher risk. Value goes up and down with company performance.</p>
              <div class="callout example"><div class="callout-label">Example</div><p>You buy 10 shares of ASML at €800 each = €8,000 invested. If ASML rises to €1,000, your investment is worth €10,000 (+25%).</p></div>
              <h3>2. Bonds (Fixed Income)</h3>
              <p>You lend money to a company or government in exchange for regular interest payments. Lower risk than stocks, but also lower returns. When interest rates rise, bond prices fall.</p>
              <h3>3. ETFs (Exchange-Traded Funds)</h3>
              <p>A basket of many stocks bundled together that trades on an exchange like a single stock. The S&P 500 ETF (SPY) holds 500 different companies. Great for beginners — instant diversification at low cost.</p>
              <div class="callout tip"><div class="callout-label">Best for Beginners</div><p>A simple S&P 500 ETF like VWRL or SPY has outperformed 90%+ of professional fund managers over 20 years. Consider making index ETFs the foundation of your portfolio.</p></div>
              <h3>4. Mutual Funds</h3>
              <p>Similar to ETFs but actively managed by a fund manager. Usually higher fees. Priced once per day (not continuously like ETFs). Most underperform their benchmark index after fees.</p>
              <h3>Quick Comparison</h3>
              <ul>
                <li>Stocks → high risk, high reward, requires research</li>
                <li>Bonds → low risk, steady income, good for balance</li>
                <li>ETFs → diversified, low cost, great starting point</li>
                <li>Mutual Funds → convenient but expensive, mostly underperform</li>
              </ul>
            </div>
          `, quiz:{ q:"What is the main advantage of an ETF over buying individual stocks?", opts:["ETFs always go up in value","ETFs give you instant diversification across many companies","ETFs pay guaranteed dividends","ETFs have no fees"], correct:1, explanation:"ETFs hold a basket of many stocks, so you're automatically diversified. If one company in the ETF collapses, it barely affects your total investment." }},

          { name:"Bull & Bear Markets", tag:"Beginner", links:[
            { type:"yt", name:"Bull vs Bear Market Explained — Investopedia", url:"https://www.youtube.com/watch?v=XbdnbCJKFqw" },
            { type:"yt", name:"Market Cycles Explained — How to Profit", url:"https://www.youtube.com/watch?v=3EfMgljGbhA" },
            { type:"web", name:"Investopedia: Bull Market vs Bear Market", url:"https://www.investopedia.com/insights/digging-deeper-bull-and-bear-markets/" },
          ], content:`
            <div class="lesson-block">
              <h3>Bull Markets</h3>
              <p>A bull market is a period of rising stock prices — typically defined as a 20%+ rise from recent lows. Bull markets are driven by strong economic growth, rising corporate profits, and investor optimism. They can last years.</p>
              <div class="callout example"><div class="callout-label">Historical Example</div><p>The bull market from 2009 to 2020 was the longest in US history — over 11 years of mostly rising prices following the 2008 financial crisis.</p></div>
              <h3>Bear Markets</h3>
              <p>A bear market is a decline of 20% or more from recent highs. They are caused by recessions, financial crises, rising interest rates, or extreme pessimism. Bear markets are painful but historically temporary.</p>
              <div class="callout warn"><div class="callout-label">Important</div><p>The average bear market lasts about 9-16 months. The average bull market lasts 4-5 years. This is why long-term investors stay invested — the ups last longer than the downs.</p></div>
              <h3>Market Cycles</h3>
              <p>Markets move in cycles: Expansion → Peak → Contraction → Trough → Recovery. Understanding where we are in the cycle helps you make better decisions about risk exposure.</p>
              <h3>Corrections vs Crashes</h3>
              <ul>
                <li><strong>Correction:</strong> 10–20% decline. Normal. Happens every 1-2 years on average.</li>
                <li><strong>Bear Market:</strong> 20%+ decline. More serious. Happens every 3-5 years.</li>
                <li><strong>Crash:</strong> Sudden, severe drop (30%+ in weeks). Rare but dramatic (2008, 2020 COVID).</li>
              </ul>
            </div>
          `, quiz:{ q:"How is a bear market officially defined?", opts:["Any day the market goes down","A decline of 5% from recent highs","A decline of 20% or more from recent highs","When interest rates rise"], correct:2, explanation:"A bear market is officially defined as a decline of 20% or more from recent highs, sustained over time. A single bad day or week does not constitute a bear market." }},

          { name:"How to Read a Stock Ticker", tag:"Beginner", links:[
            { type:"yt", name:"How to Read Stock Charts for Beginners", url:"https://www.youtube.com/watch?v=r0SBLSXJPII" },
            { type:"web", name:"Investopedia: How to Read a Stock Quote", url:"https://www.investopedia.com/articles/basics/05/stockquote.asp" },
            { type:"web", name:"Yahoo Finance — Look up any stock quote", url:"https://finance.yahoo.com" },
          ], content:`
            <div class="lesson-block">
              <h3>What Is a Stock Ticker?</h3>
              <p>A stock ticker is a short symbol used to identify a publicly listed company. Every stock has a unique ticker.</p>
              <ul>
                <li>AAPL = Apple Inc.</li>
                <li>MSFT = Microsoft</li>
                <li>AMZN = Amazon</li>
                <li>TSLA = Tesla</li>
                <li>ASML = ASML Holding (Dutch, also on NASDAQ)</li>
              </ul>
              <h3>Reading a Stock Quote</h3>
              <p>When you look up a stock, you'll see these key numbers:</p>
              <ul>
                <li><strong>Price:</strong> The current price per share</li>
                <li><strong>Change:</strong> How much it moved today (e.g. +2.34 / +1.2%)</li>
                <li><strong>Open:</strong> Price at the start of today's trading session</li>
                <li><strong>High / Low:</strong> Highest and lowest prices today</li>
                <li><strong>52-Week High/Low:</strong> Range over the past year</li>
                <li><strong>Volume:</strong> How many shares have been traded today</li>
                <li><strong>Market Cap:</strong> Total value of the company (Price × Total Shares)</li>
              </ul>
              <div class="callout example"><div class="callout-label">Example Quote: ASML</div><p>Price: €920 | Change: +€15 (+1.7%) | Open: €905 | High: €925 | Low: €900 | Volume: 1.2M | Market Cap: €365B</p></div>
              <h3>What Is Volume?</h3>
              <p>Volume tells you how many shares were traded. High volume on a price move confirms the move is real. Low volume moves are less reliable — they can reverse easily.</p>
              <div class="formula-box">Market Cap = Share Price × Total Shares Outstanding</div>
            </div>
          `, quiz:{ q:"A stock's volume is very low during a price spike. What does this suggest?", opts:["The move is very reliable","The move may not be sustainable — low conviction","The company is doing very well","You should immediately buy"], correct:1, explanation:"Low volume on a price move means few participants are involved. This reduces the reliability of the move. High volume confirms that many traders/investors are behind a move, making it more meaningful." }},

      { week:2, title:"Order Types & Market Mechanics", hours:8,
        task:"Place 10 different order types on your paper trading account. Try a market order, limit order, and stop-loss on the same stock.",
        topics:[
          { name:"Market Orders vs Limit Orders", tag:"Essential", links:[
            { type:"yt", name:"Market Order vs Limit Order — Explained", url:"https://www.youtube.com/watch?v=cVNWbQpYo5U" },
            { type:"web", name:"Investopedia: Types of Orders", url:"https://www.investopedia.com/investing/basics-trading-stock-know-your-orders/" },
          ], content:`
            <div class="lesson-block">
              <h3>Market Orders</h3>
              <p>A market order buys or sells a stock immediately at whatever the current best available price is. It guarantees execution but NOT a specific price.</p>
              <div class="callout warn"><div class="callout-label">Caution</div><p>In fast-moving or illiquid markets, you might pay more (or sell for less) than expected. This is called "slippage." For large orders or thinly traded stocks, use limit orders instead.</p></div>
              <h3>Limit Orders</h3>
              <p>A limit order lets you set the maximum price you're willing to pay (buy limit) or minimum price you'll accept (sell limit). It only executes if the price reaches your target.</p>
              <div class="callout example"><div class="callout-label">Example</div><p>Stock is trading at €50. You set a buy limit at €48. Your order only fills if the stock drops to €48 or lower. You won't accidentally pay €51 during a spike.</p></div>
              <h3>When to Use Each</h3>
              <ul>
                <li>Market order → When you need to get in/out immediately and price isn't critical</li>
                <li>Limit order → When price matters and you can wait for your level</li>
                <li>For most trades → Use limit orders. They give you price control.</li>
              </ul>
            </div>
          `, quiz:{ q:"You want to buy a stock but only if it drops to €45. What order do you place?", opts:["Market buy order","Limit buy order at €45","Stop order at €45","Short sell order"], correct:1, explanation:"A limit buy order lets you specify the exact price you want to pay. Your order will only fill at €45 or lower — never higher." }},

          { name:"Stop Orders & Stop-Limit Orders", tag:"Essential", links:[
            { type:"yt", name:"Stop Loss Orders Explained — How to Use Them", url:"https://www.youtube.com/watch?v=DdC2E6rJKXk" },
            { type:"web", name:"Investopedia: Stop-Loss vs Stop-Limit Orders", url:"https://www.investopedia.com/articles/active-trading/091813/which-order-use-stoploss-or-stoplimit-orders.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>Stop Orders (Stop-Loss)</h3>
              <p>A stop order becomes a market order when the price hits your stop price. Used primarily as a stop-loss — to automatically exit a losing trade before it gets worse.</p>
              <div class="callout example"><div class="callout-label">Example</div><p>You buy a stock at €100. You place a stop order at €90. If the stock falls to €90, your stop triggers and sells at market price. You've limited your loss to approximately €10.</p></div>
              <h3>Stop-Limit Orders</h3>
              <p>A stop-limit order becomes a LIMIT order (not a market order) when triggered. It gives you price control but risks not being filled if the stock gaps past your limit.</p>
              <h3>The Key Difference</h3>
              <ul>
                <li>Stop (market): Guaranteed exit, but price may be worse than expected in a fast drop</li>
                <li>Stop-limit: Price controlled, but might not fill if stock gaps down sharply</li>
              </ul>
              <div class="callout warn"><div class="callout-label">Important</div><p>In a market crash or earnings gap-down, a stop order might fill far below your stop price. This is called a "gap through." Stop-limits protect against this but risk not filling at all.</p></div>
              <h3>Why Stop-Losses Are Vital</h3>
              <p>Without a stop-loss, a losing trade can turn catastrophic. Professional traders ALWAYS define their maximum loss before entering a trade. Never enter a trade without knowing exactly where you'll exit if wrong.</p>
            </div>
          `, quiz:{ q:"You own a stock at €80 and place a stop-loss at €72. The stock gaps down overnight to €65 and opens at €65. At what price does your stop-market order fill?", opts:["€72 exactly","€80 (your entry price)","Around €65 (market price at open)","The order won't fill"], correct:2, explanation:"A stop (market) order triggers at your stop price (€72) but then executes at the next available market price. If the stock gapped to €65, your order fills around €65 — below your stop. This is called gap risk." }},

          { name:"Bid, Ask & The Spread", tag:"Essential", links:[
            { type:"yt", name:"Bid Ask Spread Explained Simply", url:"https://www.youtube.com/watch?v=dkFMmtRv1Kg" },
            { type:"web", name:"Investopedia: Bid-Ask Spread", url:"https://www.investopedia.com/terms/b/bid-askspread.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>Bid Price</h3>
              <p>The bid is the highest price a buyer is currently willing to pay for a stock. If you want to sell immediately, you'll sell at the bid.</p>
              <h3>Ask Price</h3>
              <p>The ask (or offer) is the lowest price a seller is currently willing to accept. If you want to buy immediately, you'll buy at the ask.</p>
              <h3>The Spread</h3>
              <p>The spread is the difference between bid and ask. It's a hidden cost of trading — you pay it every time you enter and exit a position.</p>
              <div class="formula-box">Spread = Ask Price − Bid Price</div>
              <div class="callout example"><div class="callout-label">Example</div><p>Bid: €99.95 | Ask: €100.05 | Spread: €0.10. If you buy at €100.05 and immediately sell, you'd get €99.95 — a €0.10 loss just from the spread.</p></div>
              <h3>Why Spreads Matter</h3>
              <ul>
                <li>Large-cap liquid stocks (AAPL, MSFT): Very tight spreads (€0.01–€0.05)</li>
                <li>Small-cap illiquid stocks: Wide spreads (€0.50–€2+) — very costly to trade</li>
                <li>For day traders: Spreads eat into profits significantly. Stick to liquid stocks.</li>
              </ul>
              <div class="callout tip"><div class="callout-label">Pro Tip</div><p>Always check the spread before trading a stock. A spread of 1% of the stock price means you need a 1% move just to break even. Stick to stocks with tight spreads (large-cap, high volume).</p></div>
            </div>
          `, quiz:{ q:"A stock has a bid of €50.00 and ask of €50.50. What is the spread?", opts:["€0.25","€0.50","€50.00","€1.00"], correct:1, explanation:"Spread = Ask - Bid = €50.50 - €50.00 = €0.50. This means you immediately 'lose' €0.50 per share just by entering the trade at market price." }},

          { name:"Long vs Short Positions", tag:"Intermediate", links:[
            { type:"yt", name:"Long vs Short Positions — Stock Market Explained", url:"https://www.youtube.com/watch?v=XO8DZ1poVOE" },
            { type:"web", name:"Investopedia: Long and Short Positions", url:"https://www.investopedia.com/terms/l/long.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>Going Long</h3>
              <p>Going long simply means buying a stock expecting the price to rise. You profit when price goes up. This is what most investors do — buy and hold.</p>
              <div class="callout example"><div class="callout-label">Long Example</div><p>Buy 100 shares at €50. Price rises to €70. You sell. Profit = €20 × 100 = €2,000.</p></div>
              <h3>Going Short (Short Selling)</h3>
              <p>Going short means BORROWING shares from your broker, selling them immediately, and hoping to buy them back cheaper later. You profit when price falls.</p>
              <div class="callout example"><div class="callout-label">Short Example</div><p>Borrow and sell 100 shares at €50. Price drops to €30. You buy back at €30. Profit = €20 × 100 = €2,000.</p></div>
              <div class="callout warn"><div class="callout-label">Risk Warning</div><p>Short selling has UNLIMITED risk. A long trade can only go to zero (lose 100%). A short trade can theoretically lose infinite money if the stock keeps rising. Short selling is for experienced traders only.</p></div>
              <h3>Most Beginners: Stay Long Only</h3>
              <p>As a beginner, focus exclusively on long trades. Understand the market well before attempting short selling. Many brokers also require special approval for short selling accounts.</p>
            </div>
          `, quiz:{ q:"What is the maximum possible loss when short selling a stock?", opts:["The amount you invested","100% of your investment","Unlimited — the stock can keep rising","The spread cost only"], correct:2, explanation:"When short selling, you profit if the stock falls. But if it rises, your losses have no ceiling — the stock could keep rising indefinitely. This is why short selling is dangerous for beginners." }},
        ]
      },
      { week:3, title:"Reading Financial Statements", hours:10,
        task:"Go to SEC EDGAR (sec.gov/edgar) and find Apple's most recent 10-K annual report. Read the income statement and write down the key numbers.",
        topics:[
          { name:"The Income Statement", tag:"Essential", links:[
            { type:"yt", name:"How to Read an Income Statement — ClearValue Tax", url:"https://www.youtube.com/watch?v=WEDIj9JBTC8" },
            { type:"yt", name:"Financial Statements Explained — Wall Street Survivor", url:"https://www.youtube.com/watch?v=uVHGgSXtQmE" },
            { type:"web", name:"Investopedia: Income Statement", url:"https://www.investopedia.com/terms/i/incomestatement.asp" },
            { type:"web", name:"SEC EDGAR — Read real company filings", url:"https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&type=10-K" },
          ], content:`
            <div class="lesson-block">
              <h3>What the Income Statement Shows</h3>
              <p>The income statement shows how much money a company made and spent over a period (quarterly or annually). It answers: Is this company profitable?</p>
              <h3>Key Lines You Must Understand</h3>
              <ul>
                <li><strong>Revenue (Top Line):</strong> Total money earned from sales. The starting point.</li>
                <li><strong>Gross Profit:</strong> Revenue minus Cost of Goods Sold (COGS). Shows if the core product is profitable.</li>
                <li><strong>Operating Income (EBIT):</strong> Gross profit minus operating expenses. Shows if the business itself is profitable before taxes and debt.</li>
                <li><strong>Net Income (Bottom Line):</strong> What's left after ALL expenses including taxes. The ultimate measure of profitability.</li>
                <li><strong>EPS (Earnings Per Share):</strong> Net income divided by shares outstanding. Lets you compare companies of different sizes.</li>
              </ul>
              <div class="formula-box">EPS = Net Income ÷ Total Shares Outstanding</div>
              <div class="callout example"><div class="callout-label">Apple FY2023 Example</div><p>Revenue: $383B | Gross Profit: $170B | Net Income: $97B | EPS: $6.13. Apple made $97 billion in profit on $383 billion in sales — a 25% profit margin.</p></div>
              <h3>What to Look For</h3>
              <ul>
                <li>Is revenue growing year over year?</li>
                <li>Are profit margins expanding or shrinking?</li>
                <li>Is EPS growing consistently?</li>
              </ul>
            </div>
          `, quiz:{ q:"What does EPS (Earnings Per Share) tell you?", opts:["The total revenue of the company","The profit attributed to each outstanding share","The stock price divided by revenue","The number of shares being sold"], correct:1, explanation:"EPS = Net Income / Shares Outstanding. It tells you how much profit the company earned per share. Higher and growing EPS generally signals a healthy, profitable company." }},

          { name:"The Balance Sheet", tag:"Essential", links:[
            { type:"yt", name:"How to Read a Balance Sheet — HBR Guide", url:"https://www.youtube.com/watch?v=yTXSLZS0As8" },
            { type:"web", name:"Investopedia: Balance Sheet", url:"https://www.investopedia.com/terms/b/balancesheet.asp" },
            { type:"web", name:"Macrotrends — Free financial data for any stock", url:"https://www.macrotrends.net" },
          ], content:`
            <div class="lesson-block">
              <h3>What the Balance Sheet Shows</h3>
              <p>The balance sheet is a snapshot of what a company owns (assets), what it owes (liabilities), and what belongs to shareholders (equity) at a specific point in time.</p>
              <div class="formula-box">Assets = Liabilities + Shareholders' Equity</div>
              <h3>Assets</h3>
              <ul>
                <li><strong>Current Assets:</strong> Cash, accounts receivable, inventory — things convertible to cash within a year</li>
                <li><strong>Long-Term Assets:</strong> Property, equipment, patents, goodwill</li>
              </ul>
              <h3>Liabilities</h3>
              <ul>
                <li><strong>Current Liabilities:</strong> Bills due within a year (accounts payable, short-term debt)</li>
                <li><strong>Long-Term Liabilities:</strong> Long-term debt, pension obligations</li>
              </ul>
              <h3>Key Ratios from the Balance Sheet</h3>
              <div class="formula-box">Debt-to-Equity = Total Debt ÷ Shareholders' Equity</div>
              <p>A low debt-to-equity ratio generally means a more financially stable company. High debt is risky — if sales drop, the company still owes the same interest payments.</p>
              <div class="callout tip"><div class="callout-label">What Investors Love</div><p>A company with a lot of cash, little debt, and growing equity is a fortress business. Warren Buffett specifically looks for companies with strong balance sheets that can survive any economic storm.</p></div>
            </div>
          `, quiz:{ q:"The accounting equation is: Assets = ?", opts:["Revenue + Expenses","Liabilities + Shareholders' Equity","Net Income + Dividends","Cash + Inventory"], correct:1, explanation:"The fundamental accounting equation is Assets = Liabilities + Shareholders' Equity. This always balances — hence the name 'balance sheet.'" }},

          { name:"Key Valuation Ratios", tag:"Essential", links:[
            { type:"yt", name:"P/E Ratio Explained — How to Value Stocks", url:"https://www.youtube.com/watch?v=VBp8BOcbWTk" },
            { type:"yt", name:"How to Use Financial Ratios — Aswath Damodaran", url:"https://www.youtube.com/watch?v=vhpMGKGmFaU" },
            { type:"web", name:"Investopedia: P/E Ratio", url:"https://www.investopedia.com/terms/p/price-earningsratio.asp" },
            { type:"web", name:"Simply Wall St — Visual stock analysis", url:"https://simplywall.st" },
          ], content:`
            <div class="lesson-block">
              <h3>P/E Ratio (Price-to-Earnings)</h3>
              <p>The most widely used valuation metric. It tells you how much you're paying for each dollar/euro of earnings.</p>
              <div class="formula-box">P/E = Stock Price ÷ Earnings Per Share (EPS)</div>
              <div class="callout example"><div class="callout-label">Example</div><p>Stock price: €100. EPS: €5. P/E = 20. You're paying 20× the annual earnings. A P/E of 20 means it would take 20 years of current earnings to "pay back" your investment.</p></div>
              <h3>What's a Good P/E?</h3>
              <ul>
                <li>S&P 500 historical average: ~15-18x</li>
                <li>Value stocks: 8-15x (cheap, often slower growth)</li>
                <li>Growth stocks: 25-60x (expensive, but growing fast)</li>
                <li>High P/E is only justified if earnings are growing rapidly</li>
              </ul>
              <h3>Other Key Ratios</h3>
              <ul>
                <li><strong>P/B (Price-to-Book):</strong> Price vs book value of assets. Below 1 means trading below asset value — potentially cheap.</li>
                <li><strong>P/S (Price-to-Sales):</strong> Useful for companies not yet profitable (startups, biotech).</li>
                <li><strong>PEG Ratio:</strong> P/E divided by earnings growth rate. Below 1.0 generally signals undervalued growth stock.</li>
              </ul>
              <div class="formula-box">PEG = P/E Ratio ÷ Annual EPS Growth Rate</div>
              <div class="callout warn"><div class="callout-label">Don't Use Ratios in Isolation</div><p>Never buy or sell based on a single ratio. A low P/E can mean a company is cheap OR that it's in trouble. Always look at multiple metrics together.</p></div>
            </div>
          `, quiz:{ q:"A stock has a P/E of 30 and earnings are growing at 30% per year. What is the PEG ratio?", opts:["1.0","0.5","30","3.0"], correct:0, explanation:"PEG = P/E ÷ Growth Rate = 30 ÷ 30 = 1.0. A PEG of 1.0 is considered fairly valued. Below 1.0 is generally seen as undervalued for a growth stock." }},
        ]
      },
      { week:4, title:"Risk Management Fundamentals", hours:8,
        task:"Build a simple position sizing spreadsheet. Given a €10,000 account risking 1% per trade with a stop-loss 5% below entry — how many shares can you buy at €50?",
        topics:[
          { name:"The 1-2% Rule", tag:"Critical", links:[
            { type:"yt", name:"Position Sizing — The Most Important Skill in Trading", url:"https://www.youtube.com/watch?v=rJVa-fXWmpA" },
            { type:"yt", name:"Risk Management for Traders — Rayner Teo", url:"https://www.youtube.com/watch?v=vW_jLGKVqso" },
            { type:"web", name:"Investopedia: The 1% Rule for Day Traders", url:"https://www.investopedia.com/articles/trading/09/risk-management.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>The Most Important Rule in Trading</h3>
              <p>Never risk more than 1-2% of your total trading account on any single trade. This one rule separates traders who survive long-term from those who blow up their accounts.</p>
              <div class="callout example"><div class="callout-label">Example</div><p>Account size: €10,000. Max risk per trade (1%): €100. If you buy a stock at €50 with a stop-loss at €45 (€5 risk per share), you can buy maximum 20 shares (€100 ÷ €5 = 20 shares).</p></div>
              <h3>Why This Rule Works</h3>
              <p>Even with 10 consecutive losses (very unlikely with a good strategy), you'd only be down 10% of your account. You stay in the game long enough to recover and improve.</p>
              <div class="callout warn"><div class="callout-label">What Beginners Do Wrong</div><p>Beginners often risk 10-20% on a single trade because they're "sure" about it. A few of these losses wipes out the account. The market will humble anyone who ignores risk management.</p></div>
              <h3>The Position Sizing Formula</h3>
              <div class="formula-box">
                Max Risk = Account Size × Risk % (e.g. 1%)<br>
                Risk Per Share = Entry Price − Stop-Loss Price<br>
                Position Size (shares) = Max Risk ÷ Risk Per Share
              </div>
            </div>
          `, quiz:{ q:"Your account is €20,000 and you risk 2% per trade. Your stop-loss is €4 below your entry. How many shares can you buy?", opts:["100 shares","200 shares","400 shares","50 shares"], correct:0, explanation:"Max risk = €20,000 × 2% = €400. Risk per share = €4. Shares = €400 ÷ €4 = 100 shares. This keeps your maximum loss on this trade to €400." }},

          { name:"Risk/Reward Ratio", tag:"Critical", links:[
            { type:"yt", name:"Risk Reward Ratio Explained — Rayner Teo", url:"https://www.youtube.com/watch?v=Q31K6QFUQGM" },
            { type:"web", name:"Investopedia: Risk/Reward Ratio", url:"https://www.investopedia.com/terms/r/riskrewardratio.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>What Is Risk/Reward?</h3>
              <p>The risk/reward ratio compares how much you could lose versus how much you could gain on a trade. A 1:2 ratio means for every €1 you risk, you aim to make €2.</p>
              <div class="formula-box">R/R Ratio = Potential Profit ÷ Potential Loss</div>
              <div class="callout example"><div class="callout-label">Example</div><p>Buy at €50. Stop-loss at €46 (risk: €4). Target at €58 (reward: €8). R/R = 8÷4 = 2:1. For every €1 you risk, you target €2 in profit.</p></div>
              <h3>Why Only Take 2:1 or Better Trades</h3>
              <p>Even if you're only right 40% of the time with a 2:1 R/R, you're still profitable:</p>
              <ul>
                <li>10 trades: 4 winners × €200 = €800 profit</li>
                <li>6 losers × €100 = −€600 loss</li>
                <li>Net: +€200 profit with only 40% win rate!</li>
              </ul>
              <div class="callout tip"><div class="callout-label">Golden Rule</div><p>Never enter a trade where the potential reward is less than 2× your potential risk. Skipping low R/R trades is one of the biggest edges you can give yourself.</p></div>
              <h3>Win Rate vs R/R</h3>
              <p>You don't need to be right most of the time to be profitable. A 33% win rate is profitable with a 3:1 R/R. Focus on finding good setups, not on being "right."</p>
            </div>
          `, quiz:{ q:"You have a 2:1 risk/reward and win 40% of the time. Over 10 trades risking €100 each, what is your net profit?", opts:["−€200","€0","+€200","+€800"], correct:2, explanation:"Wins: 4 × €200 = €800. Losses: 6 × €100 = −€600. Net = €800 − €600 = +€200 profit, despite only winning 40% of trades. Good R/R makes profitability possible even with a sub-50% win rate." }},

          { name:"Diversification & Correlation", tag:"Essential", links:[
            { type:"yt", name:"Diversification Explained — Ben Felix", url:"https://www.youtube.com/watch?v=3esrCaRSlsM" },
            { type:"web", name:"Investopedia: Diversification", url:"https://www.investopedia.com/terms/d/diversification.asp" },
          ], content:`
            <div class="lesson-block">
              <h3>What Is Diversification?</h3>
              <p>Diversification means spreading your money across different investments so one bad outcome doesn't destroy your portfolio.</p>
              <h3>Types of Diversification</h3>
              <ul>
                <li><strong>Across stocks:</strong> Don't put 100% in one company</li>
                <li><strong>Across sectors:</strong> Mix tech, healthcare, energy, financials</li>
                <li><strong>Across asset classes:</strong> Stocks + bonds + cash</li>
                <li><strong>Across geographies:</strong> US + Europe + Emerging markets</li>
              </ul>
              <h3>Correlation</h3>
              <p>Correlation measures how two assets move in relation to each other. If two stocks always move together, owning both doesn't actually diversify you.</p>
              <div class="callout example"><div class="callout-label">Example</div><p>Owning 10 different tech stocks (Apple, Microsoft, Google, Meta, etc.) looks diversified but they're highly correlated — they all tend to fall together in a tech sector downturn. True diversification means owning different TYPES of assets.</p></div>
              <div class="callout warn"><div class="callout-label">Over-diversification</div><p>Owning 50+ stocks doesn't necessarily reduce risk much more than owning 15-20, but it dilutes your returns. Most professional investors say 15-25 stocks in different sectors is optimal for individual stock portfolios.</p></div>
            </div>
          `, quiz:{ q:"You own 10 different tech company stocks. Are you well diversified?", opts:["Yes — 10 stocks is excellent diversification","No — highly correlated stocks in the same sector don't provide true diversification","Yes — as long as each stock is from a different company","No — you need at least 100 stocks to be diversified"], correct:1, explanation:"Diversification requires owning assets that don't all move together. 10 tech stocks are highly correlated — they tend to rise and fall at the same time. True diversification means mixing sectors and asset classes." }},
        ]
      },
    ]
